<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HPWS 高績效工作系統 Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;800&family=Noto+Serif+TC:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F0F4F8;color:#1A1A1A;font-family:'Noto Sans TC','PingFang TC',Arial,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#F0F4F8}
::-webkit-scrollbar-thumb{background:#BFBFBF;border-radius:3px}

/* ── TopBar ── */
.topbar{height:48px;background:#1F4E79;flex-shrink:0;display:flex;align-items:center;padding:0 20px;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2E5090,#1A6B3A);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;font-family:'Noto Serif TC',serif;flex-shrink:0}
.sys-title{display:flex;flex-direction:column}
.sys-title .main{font-size:13px;font-weight:700;color:#fff}
.sys-title .sub{font-size:10px;color:#D9E2F3;margin-top:1px}
.bc{display:flex;align-items:center;gap:5px;font-size:11px;flex:1;justify-content:center}
.bc-item{cursor:pointer;padding:3px 8px;border-radius:4px;color:#D9E2F3;transition:all .15s}
.bc-item:hover{background:#ffffff22;color:#fff}
.bc-active{color:#fff;font-weight:700;cursor:default}
.bc-sep{color:#D9E2F366}
.status-badge{padding:3px 12px;border-radius:20px;background:#1A6B3A33;border:1px solid #1A6B3A88;font-size:10px;color:#81C784;font-weight:700;white-space:nowrap}
.main-area{display:flex;flex:1;overflow:hidden}

/* ── L1 淺色系 ── */
#l1{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#F0F4F8}
.l1-card{background:#fff;border-radius:18px;border:1px solid #BFBFBF33;padding:30px 40px;box-shadow:0 2px 16px rgba(0,0,0,.07);display:flex;flex-direction:column;align-items:center;gap:22px;max-width:720px;width:100%}
.l1-title-area{text-align:center}
.l1-eyebrow{font-size:11px;color:#595959;letter-spacing:.2em;margin-bottom:7px;font-weight:700}
.l1-h{font-size:22px;font-weight:800;color:#1F4E79;font-family:'Noto Serif TC',serif}
.l1-sub{font-size:11px;color:#595959;margin-top:6px}
.arch-wrap{position:relative;width:580px;height:390px;flex-shrink:0}
.mod-node{position:absolute;width:104px;height:50px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;border-width:2px;border-style:solid;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.mod-node:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,.14)}
.mod-code{font-size:13px;font-weight:800;font-family:'Noto Serif TC',serif}
.mod-name{font-size:10px;margin-top:1px;color:#595959}
.legend{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:5px;cursor:pointer;padding:5px 12px;border-radius:20px;border-width:1.5px;border-style:solid;transition:all .2s;font-size:11px;font-weight:700;background:#fff}
.legend-item:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── L2 interface_spec 風格 ── */
#l2{display:none;flex:1;height:100%;overflow:hidden}
#l2.show{display:flex}
.sidebar{width:200px;flex-shrink:0;background:#fff;border-right:1px solid #BFBFBF33;display:flex;flex-direction:column;overflow-y:auto;box-shadow:1px 0 6px rgba(0,0,0,.04)}
.sb-back{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid #BFBFBF33;color:#595959;font-size:11px;transition:all .15s;flex-shrink:0}
.sb-back:hover{background:#F0F4F8;color:#1A1A1A}
.sb-sec{padding:8px 16px 4px;font-size:9px;color:#595959;letter-spacing:.15em;font-weight:700}
.sb-mod{padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;flex-direction:column;gap:3px}
.sb-mod:hover{background:#F5F5F5}
.sb-mod.active{border-left-color:var(--mc);background:var(--mlt)}
.sb-hpw{font-size:10px;font-weight:800;font-family:'Noto Serif TC',serif}
.sb-code{font-size:11px;font-weight:700}
.sb-name{font-size:10px;color:#595959}
.l2-main{flex:1;overflow-y:auto;padding:22px;background:#F0F4F8}
.mod-hdr{border-radius:12px;padding:18px 22px;margin-bottom:18px;background:#fff;border:1px solid #BFBFBF22;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.mod-hdr-top{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.mod-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;font-family:'Noto Serif TC',serif;flex-shrink:0}
.mod-hpw-tag{font-size:10px;letter-spacing:.15em;margin-bottom:3px}
.mod-title{font-size:19px;font-weight:800;color:#1A1A1A;font-family:'Noto Serif TC',serif}
.mod-en{font-size:11px;color:#595959;margin-top:2px}
.mod-desc{font-size:12px;color:#595959;margin-top:4px}
.mod-stats{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.op-stat{padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;border-width:1px;border-style:solid}
.type-sec{margin-bottom:18px}
.type-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.type-pill{padding:3px 12px;border-radius:6px;font-size:11px;font-weight:800;border-width:1px;border-style:solid}
.type-desc{font-size:11px;color:#595959}
.type-line{flex:1;height:1px;background:#BFBFBF33}
.ops-grid{display:flex;flex-wrap:wrap;gap:8px}
.op-card{padding:9px 13px;border-radius:8px;cursor:pointer;background:#fff;border:1px solid #BFBFBF33;min-width:175px;max-width:220px;display:flex;flex-direction:column;gap:3px;transition:all .18s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.op-card:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.10)}
.op-code{font-size:11px;font-weight:800}
.op-name{font-size:11px;color:#1A1A1A}
.op-hint{font-size:9px;color:#595959;margin-top:2px}

/* ── L3 Panel — interface_spec 風格 ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;opacity:0;transition:opacity .3s;backdrop-filter:blur(2px)}
#overlay.vis{opacity:1}
#panel{position:fixed;top:0;right:0;bottom:0;width:700px;max-width:96vw;background:#fff;z-index:101;display:flex;flex-direction:column;box-shadow:-4px 0 28px rgba(0,0,0,.14);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);border-left:1px solid #BFBFBF33}
#panel.vis{transform:translateX(0)}
.p-hdr{padding:12px 18px;flex-shrink:0;border-bottom:2px solid var(--tc);background:#fff;display:flex;justify-content:space-between;align-items:center}
.p-tags{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.p-tag{padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;color:#fff}
.p-opcode{font-size:13px;font-weight:800}
.p-title{font-size:16px;font-weight:700;color:#1A1A1A}
.p-close{background:#fff;border:1px solid #BFBFBF;border-radius:6px;padding:6px 14px;color:#595959;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;font-family:inherit;transition:all .15s}
.p-close:hover{background:#F0F4F8;color:#1A1A1A;border-color:#595959}
.p-toolbar{padding:6px 10px;flex-shrink:0;background:#E8E8E8;border-bottom:2px solid var(--tc);display:flex;gap:5px;flex-wrap:wrap}
.t-btn{padding:3px 9px;border-radius:4px;font-size:13px;background:#fff;border-width:1px;border-style:solid;cursor:pointer;display:flex;align-items:center;gap:3px;font-family:inherit;transition:all .15s}
.t-btn:hover{opacity:.8}
.t-btn span.lbl{font-size:10px}
.p-body{flex:1;overflow-y:auto;padding:14px 16px;background:#fff}
.p-footer{padding:7px 16px;flex-shrink:0;border-top:1px solid #BFBFBF33;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:#595959;background:#F5F5F5}
/* Label 標籤 */
.lbl-tag{display:inline-block;color:#fff;padding:2px 8px;font-size:10px;font-weight:700;border-radius:3px;margin-bottom:6px}
/* 主資料區 */
.field-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field-item{display:flex;flex-direction:column}
.field-label{font-size:9px;color:#595959;margin-bottom:2px}
.field-val{padding:3px 8px;border-radius:3px;font-size:11px;color:#1A1A1A;background:#fff}
/* 內部頁籤 */
.itabs{display:flex;border-bottom:2px solid var(--tc);margin-top:8px}
.itab{padding:4px 12px;font-size:11px;cursor:pointer;border-radius:4px 4px 0 0;margin-right:3px;border:1px solid #BFBFBF;border-bottom:none;background:#F0F0F0;color:#595959;transition:all .15s;user-select:none;font-family:inherit}
.itab.active{color:#fff}
.tab-body{border:1px solid #BFBFBF33;border-top:none;padding:8px;background:#fff;min-height:100px}
table{width:100%;border-collapse:collapse;font-size:10px;margin-top:4px}
th{padding:4px 7px;text-align:left;font-weight:700}
td{padding:4px 7px;border:1px solid #BFBFBF22;color:#1A1A1A}
tr:nth-child(even) td{background:#fafafa}
.stamp-wrap{display:flex;align-items:center}
.stamp{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:rotate(-18deg);font-weight:900;font-family:'Noto Serif TC',serif;line-height:1}
.status-sel{background:#fff;border-radius:3px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.note-green{padding:6px 9px;border-radius:4px;font-size:10px;background:#E8F5E9;color:#2E7D32;margin-top:8px}
.exec-box{padding:11px 14px;border-radius:6px;margin-bottom:10px;border:1px solid #BFBFBF33;background:#F5F5F5}
.exec-warn{padding:11px 14px;border-radius:6px;margin-bottom:10px;border:1px solid #E6510044;background:#FFF8F0}
</style>
</head>
<body>

<!-- TopBar -->
<div class="topbar">
  <div class="logo">績</div>
  <div class="sys-title">
    <div class="main">HPWS 高績效工作系統</div>
    <div class="sub">Human Performance Work System</div>
  </div>
  <div class="bc" id="bc">
    <span class="bc-item bc-active">HPW001</span>
  </div>
  <div style="width:1px;height:20px;background:#ffffff33"></div>
  <div class="status-badge">● 系統運作中</div>
</div>

<div class="main-area">

<!-- L1 -->
<div id="l1">
  <div class="l1-card">
    <div class="l1-title-area">
      <div class="l1-eyebrow">HPW001　第一層架構圖</div>
      <div class="l1-h">高績效工作系統（HPWS）</div>
      <div class="l1-sub">點擊模組節點或下方圖例進入第二層</div>
    </div>

    <div class="arch-wrap">
      <svg style="position:absolute;inset:0;width:580px;height:390px;pointer-events:none" viewBox="0 0 580 390">
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
            <path d="M2 2L8 5L2 8" fill="none" stroke="#BFBFBF" stroke-width="2" stroke-linecap="round"/>
          </marker>
        </defs>
        <!-- SCM→CFM -->
        <line x1="290" y1="70" x2="290" y2="104" stroke="#BFBFBF" stroke-width="1.5" marker-end="url(#arr)"/>
        <!-- CFM→四模組 -->
        <line x1="246" y1="152" x2="102" y2="196" stroke="#BFBFBF" stroke-width="1.2" marker-end="url(#arr)"/>
        <line x1="265" y1="152" x2="218" y2="196" stroke="#BFBFBF" stroke-width="1.2" marker-end="url(#arr)"/>
        <line x1="314" y1="152" x2="362" y2="196" stroke="#BFBFBF" stroke-width="1.2" marker-end="url(#arr)"/>
        <line x1="330" y1="152" x2="452" y2="196" stroke="#BFBFBF" stroke-width="1.2" marker-end="url(#arr)"/>
        <!-- 四模組→PVM -->
        <line x1="102" y1="248" x2="237" y2="313" stroke="#BFBFBF" stroke-width="1.2" marker-end="url(#arr)"/>
        <line x1="218" y1="248" x2="258" y2="313" stroke="#BFBFBF" stroke-width="1.2" marker-end="url(#arr)"/>
        <line x1="362" y1="248" x2="305" y2="313" stroke="#BFBFBF" stroke-width="1.2" marker-end="url(#arr)"/>
        <line x1="452" y1="248" x2="325" y2="313" stroke="#BFBFBF" stroke-width="1.2" marker-end="url(#arr)"/>
        <!-- 三軸標籤 -->
        <text x="510" y="124" fill="#595959" font-size="10" text-anchor="middle" font-family="'Noto Sans TC',sans-serif">ISO 9001</text>
        <text x="510" y="136" fill="#595959" font-size="10" text-anchor="middle" font-family="'Noto Sans TC',sans-serif">流程軸</text>
        <text x="510" y="215" fill="#595959" font-size="10" text-anchor="middle" font-family="'Noto Sans TC',sans-serif">BSC 績效軸</text>
        <text x="510" y="295" fill="#595959" font-size="10" text-anchor="middle" font-family="'Noto Sans TC',sans-serif">TTQS 人才軸</text>
        <line x1="480" y1="118" x2="546" y2="118" stroke="#2E75B633" stroke-width="1" stroke-dasharray="3 2"/>
        <line x1="480" y1="208" x2="546" y2="208" stroke="#5A2D8233" stroke-width="1" stroke-dasharray="3 2"/>
        <line x1="480" y1="288" x2="546" y2="288" stroke="#1A6B3A33" stroke-width="1" stroke-dasharray="3 2"/>
      </svg>
      <!-- 七個模組節點 -->
      <div class="mod-node" style="left:238px;top:20px;border-color:#2E5090" onclick="goL2('scm')"><div class="mod-code" style="color:#2E5090">SCM</div><div class="mod-name">系統模組</div></div>
      <div class="mod-node" style="left:238px;top:104px;border-color:#2E75B6" onclick="goL2('cfm')"><div class="mod-code" style="color:#2E75B6">CFM</div><div class="mod-name">基礎模組</div></div>
      <div class="mod-node" style="left:50px;top:198px;border-color:#5A2D82" onclick="goL2('stm')"><div class="mod-code" style="color:#5A2D82">STM</div><div class="mod-name">用才模組</div></div>
      <div class="mod-node" style="left:166px;top:198px;border-color:#1A6B3A" onclick="goL2('tam')"><div class="mod-code" style="color:#1A6B3A">TAM</div><div class="mod-name">選才模組</div></div>
      <div class="mod-node" style="left:310px;top:198px;border-color:#B8400A" onclick="goL2('lpm')"><div class="mod-code" style="color:#B8400A">LPM</div><div class="mod-name">育才模組</div></div>
      <div class="mod-node" style="left:400px;top:198px;border-color:#7B2D00" onclick="goL2('trm')"><div class="mod-code" style="color:#7B2D00">TRM</div><div class="mod-name">留才模組</div></div>
      <div class="mod-node" style="left:238px;top:313px;border-color:#00695C" onclick="goL2('pvm')"><div class="mod-code" style="color:#00695C">PVM</div><div class="mod-name">價值模組</div></div>
    </div>

    <div class="legend">
      <div class="legend-item" style="border-color:#2E5090;color:#2E5090" onclick="goL2('scm')"><div class="legend-dot" style="background:#2E5090"></div>SCM 系統模組</div>
      <div class="legend-item" style="border-color:#2E75B6;color:#2E75B6" onclick="goL2('cfm')"><div class="legend-dot" style="background:#2E75B6"></div>CFM 基礎模組</div>
      <div class="legend-item" style="border-color:#5A2D82;color:#5A2D82" onclick="goL2('stm')"><div class="legend-dot" style="background:#5A2D82"></div>STM 用才模組</div>
      <div class="legend-item" style="border-color:#1A6B3A;color:#1A6B3A" onclick="goL2('tam')"><div class="legend-dot" style="background:#1A6B3A"></div>TAM 選才模組</div>
      <div class="legend-item" style="border-color:#B8400A;color:#B8400A" onclick="goL2('lpm')"><div class="legend-dot" style="background:#B8400A"></div>LPM 育才模組</div>
      <div class="legend-item" style="border-color:#7B2D00;color:#7B2D00" onclick="goL2('trm')"><div class="legend-dot" style="background:#7B2D00"></div>TRM 留才模組</div>
      <div class="legend-item" style="border-color:#00695C;color:#00695C" onclick="goL2('pvm')"><div class="legend-dot" style="background:#00695C"></div>PVM 價值模組</div>
    </div>
  </div>
</div>

<!-- L2 -->
<div id="l2">
  <div class="sidebar" id="sidebar"></div>
  <div class="l2-main" id="l2main"></div>
</div>
</div>

<!-- L3 Panel -->
<div id="overlay" onclick="closePanel()"></div>
<div id="panel">
  <div class="p-hdr" id="p-hdr">
    <div>
      <div class="p-tags" id="p-tags"></div>
      <div class="p-title" id="p-title"></div>
    </div>
    <button class="p-close" onclick="closePanel()">✕ 關閉</button>
  </div>
  <div class="p-toolbar" id="p-toolbar"></div>
  <div class="p-body" id="p-body"></div>
  <div class="p-footer" id="p-footer"></div>
</div>

<script>
const MODS={
  scm:{code:"SCM",name:"系統模組",en:"System Control Module",color:"#2E5090",lt:"#DBEAFE22",hpw:"HPW002",desc:"使用者權限 × 群組管控 × 單據設定",
    ops:{G:[["SCMG01","使用者登入代號建立"],["SCMG02","使用者群組代號建立"],["SCMG03","使用者權限建立"],["SCMG04","作業單據設定建立"],["SCMG05","資料誤刪還原"]],
         B:[["SCMB01","使用者權限複製批次"],["SCMB02","歷史資料清除批次"]],
         Q:[["SCMQ01","操作稽核查詢"],["SCMQ02","簽核進度查詢"]]}},
  cfm:{code:"CFM",name:"基礎模組",en:"Core HR Foundation",color:"#2E75B6",lt:"#CFE2F322",hpw:"HPW003",desc:"KSAO 職能科目層級結構",
    ops:{G:[["CFMG01","系統共用參數設定"],["CFMG02","職能群組參照建立"],["CFMG03","職能科目層級結構建立"],["CFMG04","職能明細科目建立"],["CFMG05","職能模型建立"],["CFMG06","薪酬結構等級設定"],["CFMG07","職務建立"],["CFMG08","職能科目Excel匯入設定"],["CFMG09","職務分類Excel匯入設定"]],
         B:[["CFMB01","職務說明書開帳批次"],["CFMB02","職能科目Excel匯入批次"],["CFMB03","職務分類Excel匯入批次"]],
         Q:[["CFMQ01","職能知識庫查詢"]],
         V:[["CFMV01","職務建立憑證"]]}},
  stm:{code:"STM",name:"用才模組",en:"Strategic Talent Mgmt",color:"#5A2D82",lt:"#EDE0F522",hpw:"HPW004",desc:"願景 × 策略 × KPI × 組織設計",
    ops:{G:[["STMG01","願景使命建立"],["STMG02","SWOT環境偵查建立"],["STMG03","SWOT因素評分"],["STMG04","策略規劃來源建立"],["STMG05","TOWS策略矩陣建立"],["STMG06","QSPM策略選擇建立"],["STMG07","QSPM吸引力評分"],["STMG08","策略地圖建立"],["STMG09","組織圖建立"],["STMG10","KPI指標樹建立"],["STMG11","結果指標申報"],["STMG12","部門編制建立"],["STMG13","部門OGSM建立"],["STMG14","部門OKR建立"]],
         B:[["STMB01","KPI新年度展期批次"],["STMB02","年度部門人力計畫批次"]],
         R:[["STMR01","KPI指標樹查詢報表"],["STMR02","策略達成率報表"],["STMR03","策略環境分析報表"],["STMR04","IE矩陣與建議策略報表"],["STMR05","組織與策略地圖報表"]]}},
  tam:{code:"TAM",name:"選才模組",en:"Talent Acquisition",color:"#1A6B3A",lt:"#D9F0E322",hpw:"HPW005",desc:"JD × 招募 × 甄選評估",
    ops:{G:[["TAMG01","工作任務目錄建立"],["TAMG02","職務任務模板設定"],["TAMG03","工作說明書建立"],["TAMG04","職缺申請建立"],["TAMG05","應徵者甄選評估"],["TAMG06","員工基本資料建立"],["TAMG07","工作說明書異動申請"]],

         R:[["LPMR01","360度績效回饋報表"],["LPMR02","教育訓練效能評鑑報表"],["LPMR03","教育訓練規劃與實施差異分析報表"],["LPMR04","教育訓練評量結果報表"],["LPMR05","年度訓練成果彙整報表"],["LPMR06","年度教育訓練計畫彙整報表"]],

    ops:{G:[["TRMG01","員工績效考核建立"],["TRMG02","績效考核週期結轉統計"],["TRMG03","員工績效面談建立"],["TRMG04","員工發展計畫建立"],["TRMG05","員工發展計畫追蹤"],["TRMG06","員工協助方案建立"],["TRMG07","員工績效改善計畫建立"],["TRMG08","員工績效改善計畫結案"],["TRMG09","策略性人才管理規劃"],["TRMG10","關鍵職位建立"],["TRMG11","人才績效潛力評估"],["TRMG12","關鍵人才建立"],["TRMG13","接班人計畫建立"],["TRMG14","人才激勵方案建立"]],
         B:[["TRMB01","績效考核年度開帳批次"],["TRMB02","績效考核週期結轉批次"],["TRMB03","績效整合產生發展計畫批次"]],
         R:[["TRMR01","員工績效考核結果統計報表"],["TRMR02","職能差距彙整報表"],["TRMR03","人才九宮格報表"],["TRMR04","接班人就緒度報表"]],
         V:[["TRMV01","績效考核憑證"],["TRMV02","績效面談憑證"],["TRMV03","員工發展計畫憑證"],["TRMV04","績效改善計畫憑證"]]}},
  pvm:{code:"PVM",name:"價值模組",en:"Performance & Value",color:"#00695C",lt:"#E0F2F122",hpw:"HPW008",desc:"ROI × 人力資本 × TTQS佐證",
    ops:{G:[["PVMG01","全績效週期整合結轉統計"],["PVMG02","人力資本價值評估"]],
         B:[["PVMB01","全績效週期整合結轉批次"],["PVMB02","人力資本價值評估批次"]],
         Q:[["PVMQ01","計畫（Plan）- TTQS企業版查詢"],["PVMQ02","設計（Design）- TTQS企業版查詢"],["PVMQ03","執行（Do）- TTQS企業版查詢"],["PVMQ04","查核（Review）- TTQS企業版查詢"],["PVMQ05","結果（Outcome）- TTQS企業版查詢"]],
         R:[["PVMR01","企業職能差異分析報表"],["PVMR02","組織人力資本價值評估報表"],["PVMR03","高績效工作系統效益評估報表"]]}}

const TC={
  G:{color:"#2E75B6",lt:"#CFE2F3",label:"G 作業",desc:"一般作業"},
  B:{color:"#C55A00",lt:"#FCE4D6",label:"B 作業",desc:"批次作業"},
  Q:{color:"#1A6B3A",lt:"#D9F0E3",label:"Q 作業",desc:"查詢作業"},
  V:{color:"#922B21",lt:"#FDECEA",label:"V 作業",desc:"憑證作業"},
  R:{color:"#5A2D82",lt:"#EDE0F5",label:"R 作業",desc:"報表作業"},
};
const MKEYS=Object.keys(MODS);
const TAB_LABELS=["頁籤一 基本資料","頁籤二 明細資料","頁籤三 補充說明"];
const TAB_DATA=[
  {h:["欄位","說明","必填"],r:[["代碼","系統自動產生","✓"],["名稱","手動輸入","✓"],["狀態","系統控制","—"],["日期","自動帶入","—"]]},
  {h:["序","項目","數值","備註"],r:[["1","項目A","100","正常"],["2","項目B","200","注意"],["3","項目C","50","—"]]},
  {h:["欄位","內容"],r:[["備註",""],["附件","尚未上傳"],["建立者","系統管理員"]]},
];
let _tc=null;

function goL1(){
  document.getElementById('l1').style.display='flex';
  document.getElementById('l2').classList.remove('show');
  closePanel();
  setBc([{t:'HPW001',active:true}]);
}
function goL2(id){
  const m=MODS[id];
  document.getElementById('l1').style.display='none';
  document.getElementById('l2').classList.add('show');
  renderSidebar(id);
  renderL2(id);
  setBc([{t:'HPW001',fn:'goL1()'},{t:m.hpw+' '+m.code,active:true,col:m.color}]);
}
function setBc(items){
  const bc=document.getElementById('bc');
  bc.innerHTML='';
  items.forEach((item,i)=>{
    if(i>0){const s=document.createElement('span');s.className='bc-sep';s.textContent='›';bc.appendChild(s);}
    const span=document.createElement('span');
    span.className='bc-item'+(item.active?' bc-active':'');
    span.textContent=item.t;
    if(item.fn)span.setAttribute('onclick',item.fn);
    if(item.col)span.style.color=item.col;
    bc.appendChild(span);
  });
}
function renderSidebar(activeId){
  const sb=document.getElementById('sidebar');
  sb.innerHTML=`<div class="sb-back" onclick="goL1()">← HPW001 架構圖</div><div class="sb-sec">第二層模組</div>`;
  MKEYS.forEach(id=>{
    const m=MODS[id],isAct=id===activeId;
    const d=document.createElement('div');
    d.className='sb-mod'+(isAct?' active':'');
    d.style.setProperty('--mc',m.color);
    d.style.setProperty('--mlt',m.lt);
    d.innerHTML=`<div style="display:flex;align-items:center;gap:5px">
      <span class="sb-hpw" style="color:${isAct?m.color:'#595959'}">${m.hpw}</span>
      <span class="sb-code" style="color:${isAct?m.color:'#1A1A1A'}">${m.code}</span>
    </div><div class="sb-name">${m.name}</div>`;
    d.onclick=()=>goL2(id);
    sb.appendChild(d);
  });
}
function renderL2(id){
  const m=MODS[id];
  const types=Object.keys(m.ops);
  const stats=types.map(t=>`<div class="op-stat" style="background:${TC[t].lt};border-color:${TC[t].color}55;color:${TC[t].color}">${TC[t].label}　${m.ops[t].length} 支</div>`).join('');
  const secs=types.map(t=>{
    const tc=TC[t];
    const cards=m.ops[t].map(([code,name])=>`
      <div class="op-card" onclick="openPanel('${id}','${t}','${code}','${name}')"
        onmouseover="this.style.borderColor='${tc.color}88';this.style.background='${tc.lt}'"
        onmouseout="this.style.borderColor='#BFBFBF33';this.style.background='#fff'">
        <div class="op-code" style="color:${tc.color}">${code}</div>
        <div class="op-name">${name}</div>
        <div class="op-hint">點擊開啟介面 →</div>
      </div>`).join('');
    return `<div class="type-sec">
      <div class="type-hdr">
        <div class="type-pill" style="background:${tc.lt};border-color:${tc.color}66;color:${tc.color}">${tc.label}</div>
        <div class="type-desc">${tc.desc}</div>
        <div class="type-line"></div>
      </div>
      <div class="ops-grid">${cards}</div>
    </div>`;
  }).join('');
  document.getElementById('l2main').innerHTML=`
    <div class="mod-hdr">
      <div class="mod-hdr-top">
        <div class="mod-icon" style="background:${m.color}">${m.code}</div>
        <div>
          <div class="mod-hpw-tag" style="color:${m.color}">${m.hpw}　第二層</div>
          <div class="mod-title">${m.name}（${m.code}）</div>
          <div class="mod-en">${m.en}</div>
        </div>
      </div>
      <div class="mod-desc">${m.desc}</div>
      <div class="mod-stats">${stats}</div>
    </div>${secs}`;
}
function openPanel(modId,type,code,name){
  const m=MODS[modId],tc=TC[type];
  _tc=tc;
  document.getElementById('panel').style.setProperty('--tc',tc.color);
  document.getElementById('p-hdr').style.borderBottomColor=tc.color;
  document.getElementById('p-tags').innerHTML=`
    <span class="p-tag" style="background:${tc.color}">${tc.label}</span>
    <span class="p-tag" style="background:${m.color}">${m.code}</span>
    <span class="p-opcode" style="color:${tc.color}">${code}</span>`;
  document.getElementById('p-title').textContent=name;
  // 工具列 — interface_spec 風格
  const btns=type==='B'
    ?[['▶️','執行',true],['📤','輸出結果',false],['✖️','關閉',false]]
    :type==='G'
    ?[['➕','新增',false],['✏️','修改',false],['🗑️','刪除',false],['📋','複製',false],['🔍','查詢',false],['📤','輸出',false],['🖨️','列印',false],['✅','確認',true],['↩️','取消確認',false],['🗂️','作廢',false],['✖️','關閉',false]]
    :[['🔍','查詢',false],['📤','輸出Excel',false],['🖨️','列印',false],['✖️','關閉',false]];
  document.getElementById('p-toolbar').style.borderBottomColor=tc.color;
  document.getElementById('p-toolbar').innerHTML=btns.map(([i,l,hi])=>
    `<button class="t-btn" style="${hi?`background:${tc.color};border-color:${tc.color};color:#fff`:`border-color:${tc.color};color:${tc.color}`}">
      ${i}<span class="lbl">${l}</span></button>`).join('');
  renderBody(type,tc,m,code);
  document.getElementById('p-footer').innerHTML=`<span>${m.name}（${m.code}）→ ${tc.label} → ${code}</span><span style="color:${tc.color}">${tc.desc}</span>`;
  const ov=document.getElementById('overlay');
  ov.style.display='block';
  setTimeout(()=>{ov.classList.add('vis');document.getElementById('panel').classList.add('vis');},20);
}
function renderBody(type,tc,m,code){
  const body=document.getElementById('p-body');
  const yr=new Date().getFullYear();
  const mo=String(new Date().getMonth()+1).padStart(2,'0');
  if(type==='G'){
    body.innerHTML=`
      <div class="lbl-tag" style="background:${tc.color}">主資料區</div>
      <div class="field-row">
        <div class="field-item">
          <div class="field-label">單號</div>
          <div class="field-val" style="border:1px solid ${tc.color}55">${code}-${yr}${mo}-0001</div>
        </div>
        <div class="field-item">
          <div class="field-label">群組</div>
          <div class="field-val" style="border:1px solid ${tc.color}55">台北業務員工</div>
        </div>
        <div class="field-item">
          <div class="field-label">狀態（點選切換）</div>
          <select class="status-sel" id="stat-sel" onchange="chkSt(this)" style="color:#888;border:1px solid ${tc.color}55">
            <option value="DRAFT">DRAFT</option>
            <option value="PENDING">PENDING</option>
            <option value="CONFIRMED">CONFIRMED</option>
            <option value="REJECTED">REJECTED</option>
            <option value="CANCELLED">CANCELLED</option>
          </select>
        </div>
        <div class="stamp-wrap" id="stamp-wrap"></div>
      </div>
      <div class="lbl-tag" style="background:${tc.color}">明細區</div>
      <div class="itabs" id="itabs" style="border-bottom-color:${tc.color}">
        ${TAB_LABELS.map((t,i)=>`<button class="itab${i===0?' active':''}" style="${i===0?`background:${tc.color};color:#fff;border-color:${tc.color}`:''}" onclick="swTab(this,${i})">${t}</button>`).join('')}
      </div>
      <div class="tab-body" id="tab-body" style="border-color:${tc.color}33"></div>
      <div class="note-green">💡 切換狀態 <strong>CONFIRMED</strong> → 右上角出現「核」印章；切換 <strong>CANCELLED</strong> → 出現「廢」</div>`;
    swTab(document.querySelector('.itab'),0);
  } else if(type==='B'){
    body.innerHTML=`
      <div class="exec-box">
        <div style="font-size:11px;color:#595959;font-weight:700;margin-bottom:8px">執行條件</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${[["執行期間","2026-01 ~ 2026-03"],["群組範圍","全公司"],["處理模式","全量更新"]].map(([l,v])=>`
            <div class="field-item">
              <div class="field-label">${l}</div>
              <div class="field-val" style="border:1px solid #BFBFBF55">${v}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="exec-warn">
        <div style="font-size:11px;color:#E65100;font-weight:700;margin-bottom:4px">⚠️ 執行前提醒</div>
        <div style="font-size:11px;color:#595959">將處理資料 <strong style="color:#1A1A1A">342 筆</strong>，執行後資料將無法還原，請確認後再執行。</div>
      </div>
      <div class="exec-box">
        <div style="font-size:11px;color:#595959;font-weight:700;margin-bottom:6px">執行結果</div>
        <div style="display:flex;gap:16px;font-size:11px">
          <span style="color:#1B5E20">✅ 成功：338 筆</span>
          <span style="color:#C00">⚠️ 失敗：4 筆</span>
        </div>
      </div>`;
  } else {
    body.innerHTML=`
      <div class="lbl-tag" style="background:${tc.color}">查詢條件</div>
      <div class="field-row">
        ${[["期間（起）","2026-01-01"],["期間（迄）","2026-03-31"],["群組","全部"]].map(([l,v])=>`
          <div class="field-item">
            <div class="field-label">${l}</div>
            <div class="field-val" style="border:1px solid ${tc.color}55">${v}</div>
          </div>`).join('')}
      </div>
      <div class="lbl-tag" style="background:${tc.color}">查詢結果</div>
      <table>
        <thead><tr>${["期間","部門","員工","項目","結果"].map(h=>`<th style="background:${tc.color}22;border:1px solid ${tc.color}44">${h}</th>`).join('')}</tr></thead>
        <tbody>
          <tr><td>2026 Q1</td><td>業務部</td><td>王小明</td><td>KPI達成</td><td>92%</td></tr>
          <tr><td>2026 Q1</td><td>業務部</td><td>李大華</td><td>KPI達成</td><td>78%</td></tr>
          <tr><td>2026 Q1</td><td>人資部</td><td>陳美玲</td><td>訓練完成</td><td>100%</td></tr>
        </tbody>
      </table>`;
  }
}
function swTab(el,idx){
  document.querySelectorAll('.itab').forEach((t,i)=>{
    const isA=i===idx;
    t.style.background=isA?_tc.color:'#F0F0F0';
    t.style.color=isA?'#fff':'#595959';
    t.style.borderColor=isA?_tc.color:'#BFBFBF';
    t.classList.toggle('active',isA);
  });
  const d=TAB_DATA[idx];
  document.getElementById('tab-body').innerHTML=`<table>
    <thead><tr>${d.h.map(h=>`<th style="background:${_tc.color}22;border:1px solid ${_tc.color}44">${h}</th>`).join('')}</tr></thead>
    <tbody>${d.r.map((r,i)=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;
}
function chkSt(sel){
  const cols={DRAFT:'#888',PENDING:'#E65100',CONFIRMED:'#1B5E20',REJECTED:'#5D4037',CANCELLED:'#555'};
  sel.style.color=cols[sel.value];
  const cfg={
    PENDING:{l:'待核',c:'#7B3F00',bg:'#FFF3E0',br:'#E65100',sz:'12px'},
    CONFIRMED:{l:'核',c:'#7B0000',bg:'#FDECEA',br:'#C62828',sz:'17px'},
    REJECTED:{l:'退',c:'#4E342E',bg:'#EFEBE9',br:'#8D6E63',sz:'12px'},
    CANCELLED:{l:'廢',c:'#424242',bg:'#F5F5F5',br:'#9E9E9E',sz:'12px'}
  };
  const s=cfg[sel.value];
  document.getElementById('stamp-wrap').innerHTML=s
    ?`<div class="stamp" style="border:2.5px solid ${s.br};background:${s.bg};box-shadow:0 0 0 1px ${s.br}55,inset 0 0 6px ${s.br}22">
        <span style="color:${s.c};font-size:${s.sz}">${s.l}</span>
      </div>`:'';
}
function closePanel(){
  document.getElementById('overlay').classList.remove('vis');
  document.getElementById('panel').classList.remove('vis');
  setTimeout(()=>{document.getElementById('overlay').style.display='none';},300);
}
</script>
</body>
</html>
