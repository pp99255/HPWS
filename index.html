<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPWS 系統設計規範 - 1.2.3 介面設計標準</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #F0F4F8;
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ── 色盤（完整版含 V 憑證）────────────────────────────────────
    const C = {
      navy: "#1F4E79", navyLt: "#D9E2F3",
      scm:  "#2E5090", scmLt:  "#DBEAFE",
      g:    "#2E75B6", gLt:    "#CFE2F3",
      b:    "#C55A00", bLt:    "#FCE4D6",
      q:    "#1A6B3A", qLt:    "#D9F0E3",
      v:    "#922B21", vLt:    "#FDECEA",   // V 憑證 — 深紅
      r:    "#5A2D82", rLt:    "#EDE0F5",
      border: "#BFBFBF", bg: "#F5F5F5",
      text: "#1A1A1A", sub: "#595959",
    };

    // ── 工具列 ────────────────────────────────────────────────────
    const Toolbar = ({ buttons = [], color = C.g }) => (
      <div style={{
        background: "#E8E8E8", borderBottom: `2px solid ${color}`,
        padding: "6px 10px", display: "flex", gap: "6px", flexWrap: "wrap",
        borderRadius: "6px 6px 0 0",
      }}>
        {buttons.map(({ icon, label, disabled, highlight }) => (
          <button key={label} title={label} style={{
            background: disabled ? "#ddd" : highlight ? color : "#fff",
            border: `1px solid ${disabled ? "#ccc" : color}`,
            borderRadius: "4px", padding: "3px 8px", cursor: disabled ? "not-allowed" : "pointer",
            color: disabled ? "#aaa" : highlight ? "#fff" : color,
            fontSize: "13px", display: "flex", alignItems: "center", gap: "3px",
          }}>
            <span>{icon}</span>
            <span style={{ fontSize: "10px" }}>{label}</span>
          </button>
        ))}
      </div>
    );

    // ── 「核」印章 ─────────────────────────────────────────────────
    const STAMP_CONFIG = {
      DRAFT:     null,
      PENDING:   { label: "待核", color: "#7B3F00", bg: "#FFF3E0", border: "#E65100" },
      CONFIRMED: { label: "核",   color: "#7B0000", bg: "#FDECEA", border: "#C62828" },
      REJECTED:  { label: "退",   color: "#4E342E", bg: "#EFEBE9", border: "#8D6E63" },
      CANCELLED: { label: "廢",   color: "#424242", bg: "#F5F5F5", border: "#9E9E9E" },
    };

    const Stamp = ({ status }) => {
      const s = STAMP_CONFIG[status];
      if (!s) return null;
      return (
        <div style={{
          position: "absolute", top: "8px", right: "10px",
          width: "44px", height: "44px", borderRadius: "50%",
          border: `2.5px solid ${s.border}`,
          display: "flex", alignItems: "center", justifyContent: "center",
          background: s.bg,
          boxShadow: `0 0 0 1px ${s.border}55, inset 0 0 6px ${s.border}22`,
          transform: "rotate(-18deg)",
          zIndex: 20,
        }}>
          <span style={{
            color: s.color, fontWeight: 900, fontFamily: "'Noto Serif TC', serif",
            fontSize: status === "CONFIRMED" ? "17px" : "12px",
            letterSpacing: status === "CONFIRMED" ? "-1px" : "0",
            lineHeight: 1,
          }}>{s.label}</span>
        </div>
      );
    };

    // ── 輔助元件 ──────────────────────────────────────────────────
    const Label = ({ text, color }) => (
      <div style={{
        background: color, color: "#fff", padding: "2px 8px",
        fontSize: "10px", fontWeight: 700, borderRadius: "3px",
        display: "inline-block", marginBottom: "6px",
      }}>{text}</div>
    );

    const Field = ({ label, value = "___", width = "120px", color = C.g }) => (
      <div style={{ display: "flex", flexDirection: "column", minWidth: width }}>
        <span style={{ fontSize: "9px", color: C.sub, marginBottom: "2px" }}>{label}</span>
        <div style={{
          border: `1px solid ${color}66`, borderRadius: "3px",
          padding: "3px 6px", fontSize: "11px", color: C.text,
          background: "#fff", minWidth: width,
        }}>{value}</div>
      </div>
    );

    const Tab = ({ tabs, active, color }) => (
      <div style={{ display: "flex", borderBottom: `2px solid ${color}`, marginTop: "10px" }}>
        {tabs.map((t, i) => (
          <div key={t} style={{
            padding: "4px 12px", fontSize: "11px", cursor: "pointer",
            background: i === active ? color : "#f0f0f0",
            color: i === active ? "#fff" : C.sub,
            borderRadius: "4px 4px 0 0", marginRight: "3px",
            border: `1px solid ${color}`, borderBottom: "none",
          }}>{t}</div>
        ))}
      </div>
    );

    const Grid = ({ headers, rows, color }) => (
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "10px", marginTop: "6px" }}>
        <thead>
          <tr>{headers.map(h => (
            <th key={h} style={{
              background: color + "22", border: `1px solid ${color}44`,
              padding: "3px 6px", color: C.text, fontWeight: 700, textAlign: "left",
            }}>{h}</th>
          ))}</tr>
        </thead>
        <tbody>{rows.map((r, i) => (
          <tr key={i} style={{ background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
            {r.map((c, j) => (
              <td key={j} style={{ border: `1px solid ${color}22`, padding: "3px 6px", color: C.text }}>{c}</td>
            ))}
          </tr>
        ))}</tbody>
      </table>
    );

    const Box = ({ title, subtitle, color, children, badge }) => (
      <div style={{
        border: `2px solid ${color}`, borderRadius: "8px",
        overflow: "hidden", boxShadow: `0 2px 8px ${color}22`,
        fontFamily: "'Noto Sans TC', Arial, sans-serif",
      }}>
        <div style={{
          background: color, color: "#fff", padding: "6px 12px",
          display: "flex", justifyContent: "space-between", alignItems: "center",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
            <span style={{ fontWeight: 700, fontSize: "13px" }}>{title}</span>
            {badge && (
              <span style={{
                background: "#fff3", border: "1px solid #fff8",
                borderRadius: "10px", padding: "1px 8px", fontSize: "10px", fontWeight: 700,
              }}>{badge}</span>
            )}
          </div>
          <span style={{ fontSize: "10px", opacity: 0.85 }}>{subtitle}</span>
        </div>
        <div style={{ padding: "10px 12px", background: "#fafafa" }}>{children}</div>
      </div>
    );

    // ══════════════════════════════════════════════════════════════
    // ── MasterForm ────────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    function MasterFormDemo() {
      return (
        <Box title="MasterForm　單檔作業" subtitle="G 作業 — 無單號" color={C.g}>
          <Toolbar color={C.g} buttons={[
            { icon: "➕", label: "新增" }, { icon: "✏️", label: "修改" },
            { icon: "🗑️", label: "刪除" }, { icon: "📋", label: "複製" },
            { icon: "🔍", label: "查詢" }, { icon: "📤", label: "輸出" },
            { icon: "🖨️", label: "列印" }, { icon: "✖️", label: "關閉" },
          ]} />
          <div style={{ background: "#fff", padding: "10px", border: `1px solid ${C.g}33`, borderTop: "none" }}>
            <Label text="主資料區" color={C.g} />
            <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", marginBottom: "10px" }}>
              <Field label="代碼" value="EMP-001" color={C.g} />
              <Field label="姓名" value="王小明" color={C.g} />
              <Field label="部門" value="業務部" color={C.g} />
              <Field label="職稱" value="業務專員" color={C.g} />
            </div>
            <Tab tabs={["頁籤一 基本資料", "頁籤二 職務資訊", "頁籤三 薪酬", "頁籤四 緊急聯絡"]} active={0} color={C.g} />
            <div style={{ border: `1px solid ${C.g}33`, padding: "8px", borderTop: "none", background: "#fff" }}>
              <Grid headers={["欄位A", "欄位B", "欄位C", "備註"]}
                rows={[["資料1", "資料2", "資料3", "—"], ["資料4", "資料5", "資料6", "—"]]} color={C.g} />
            </div>
            <div style={{ fontSize: "10px", color: C.sub, marginTop: "6px" }}>
              範例：CFMG01 系統共用參數 / TAMG06 員工基本資料 / LPMG01 師資建立
            </div>
          </div>
        </Box>
      );
    }

    // ══════════════════════════════════════════════════════════════
    // ── DocumentForm ─────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    function DocumentFormDemo() {
      const [status, setStatus] = useState("DRAFT");
      const statusColors = {
        DRAFT: "#888", PENDING: "#E65100", CONFIRMED: "#1B5E20",
        REJECTED: "#5D4037", CANCELLED: "#555",
      };

      return (
        <Box title="DocumentForm　單據作業" subtitle="G 作業 — 有單號（JB/JD/PA/PI/ID/PP/NA/TP/TR）" color={C.navy}>
          <Toolbar color={C.navy} buttons={[
            { icon: "➕", label: "新增" }, { icon: "✏️", label: "修改" },
            { icon: "🗑️", label: "刪除" }, { icon: "🔍", label: "查詢" },
            { icon: "📤", label: "輸出" }, { icon: "🖨️", label: "列印" },
            { icon: "✅", label: "確認", highlight: true }, { icon: "↩️", label: "取消確認" },
            { icon: "✖️", label: "關閉" },
          ]} />
          <div style={{ background: "#fff", padding: "10px", border: `1px solid ${C.navy}33`, borderTop: "none", position: "relative" }}>

            {/* 「核」印章 — 右上角 */}
            <Stamp status={status} />

            <Label text="單頭區" color={C.navy} />
            <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", marginBottom: "8px" }}>
              <Field label="單別" value="JD001" color={C.navy} />
              <Field label="單號" value="JD001-20260422-0001" width="175px" color={C.navy} />
              <Field label="群組" value="台北業務員工" width="120px" color={C.navy} />
              {/* 狀態選單（互動） */}
              <div style={{ display: "flex", flexDirection: "column" }}>
                <span style={{ fontSize: "9px", color: C.sub, marginBottom: "2px" }}>狀態（點選體驗印章）</span>
                <select value={status} onChange={e => setStatus(e.target.value)} style={{
                  border: `1px solid ${C.navy}66`, borderRadius: "3px",
                  padding: "3px 6px", fontSize: "11px",
                  color: statusColors[status], fontWeight: 700,
                  background: "#fff", cursor: "pointer",
                }}>
                  {Object.keys(statusColors).map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <Label text="主資料區" color={C.navy} />
            <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", marginBottom: "10px" }}>
              <Field label="職位" value="業務專員" color={C.navy} />
              <Field label="部門" value="業務部" color={C.navy} />
              <Field label="直屬主管" value="李主管" color={C.navy} />
            </div>
            <Label text="單身區（明細）" color={C.navy} />
            <Grid headers={["序", "KSAO 科目", "說明", "權重", "操作"]}
              rows={[
                ["1", "K001 市場分析", "了解市場動態", "20%", "✏️ 🗑️"],
                ["2", "S012 簡報技巧", "客戶簡報能力", "15%", "✏️ 🗑️"],
                ["3", "A003 溝通協調", "跨部門協作", "15%", "✏️ 🗑️"],
              ]} color={C.navy} />

            {/* 狀態流程 */}
            <div style={{ marginTop: "10px", display: "flex", alignItems: "center", gap: "6px", flexWrap: "wrap" }}>
              <span style={{ fontSize: "10px", color: C.sub }}>狀態流程：</span>
              {Object.entries(statusColors).map(([s, c], i, arr) => (
                <span key={s} style={{ display: "flex", alignItems: "center", gap: "4px" }}>
                  <span style={{
                    background: c + "18", border: `1.5px solid ${c}`,
                    borderRadius: "4px", padding: "1px 7px",
                    fontSize: "10px", fontWeight: 700, color: c,
                  }}>{s}</span>
                  {i < arr.length - 1 && <span style={{ color: "#ccc", fontSize: "10px" }}>→</span>}
                </span>
              ))}
            </div>

            <div style={{ marginTop: "8px", padding: "5px 8px", background: "#E8F5E9", borderRadius: "4px", fontSize: "10px", color: "#2E7D32" }}>
              💡 上方「狀態」切換為 <strong>CONFIRMED</strong> → 右上角出現紅色「核」印章；切換其他狀態觀察標記變化
            </div>
            <div style={{ fontSize: "10px", color: C.sub, marginTop: "6px" }}>
              人才價值鏈：CFMG07(JB) / TAMG03(JD) / TRMG01(PA) / TRMG03(PI) / TRMG04(ID) / TRMG05(PP)<br/>
              人才培育鏈：LPMG10(NA) / LPMG11(TP) / LPMG12(TR)
            </div>
          </div>
        </Box>
      );
    }

    // ══════════════════════════════════════════════════════════════
    // ── BatchForm ────────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    function BatchFormDemo() {
      return (
        <Box title="BatchForm　批次作業" subtitle="B 作業 — is_admin=1 才可見" color={C.b}>
          <Toolbar color={C.b} buttons={[
            { icon: "▶️", label: "執行" }, { icon: "📤", label: "輸出結果" }, { icon: "✖️", label: "關閉" },
          ]} />
          <div style={{ background: "#fff", padding: "10px", border: `1px solid ${C.b}33`, borderTop: "none" }}>
            <Label text="執行條件區" color={C.b} />
            <div style={{ display: "flex", gap: "10px", marginBottom: "10px" }}>
              <Field label="執行期間" value="2026-01 ~ 2026-03" width="150px" color={C.b} />
              <Field label="群組範圍" value="全公司" color={C.b} />
              <Field label="處理模式" value="全量更新" color={C.b} />
            </div>
            <Label text="執行預覽" color={C.b} />
            <div style={{ background: C.bLt, border: `1px solid ${C.b}44`, borderRadius: "4px", padding: "8px", marginBottom: "10px", fontSize: "11px" }}>
              <div>將處理資料：<strong>342 筆</strong></div>
              <div style={{ color: "#C00", marginTop: "4px" }}>⚠️ 執行後資料將無法還原，請確認後再執行。</div>
            </div>
            <Label text="執行結果" color={C.b} />
            <div style={{ display: "flex", gap: "16px", fontSize: "11px" }}>
              <span style={{ color: "#1B5E20" }}>✅ 成功：338 筆</span>
              <span style={{ color: "#C00" }}>⚠️ 失敗：4 筆</span>
            </div>
            <div style={{ fontSize: "10px", color: C.sub, marginTop: "6px" }}>
              範例：SCMB01 權限複製 / SCMB02 歷史清除 / CFMB01 職務說明書開帳
            </div>
          </div>
        </Box>
      );
    }

    // ══════════════════════════════════════════════════════════════
    // ── QueryForm ────────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    function QueryFormDemo() {
      return (
        <Box title="QueryForm　查詢作業" subtitle="Q 作業 — is_admin=1 才可見" color={C.q}>
          <Toolbar color={C.q} buttons={[
            { icon: "🔍", label: "查詢" }, { icon: "📤", label: "輸出Excel" },
            { icon: "🖨️", label: "列印" }, { icon: "✖️", label: "關閉" },
          ]} />
          <div style={{ background: "#fff", padding: "10px", border: `1px solid ${C.q}33`, borderTop: "none" }}>
            <Label text="查詢條件區" color={C.q} />
            <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", marginBottom: "10px" }}>
              <Field label="期間（起）" value="2026-01-01" width="110px" color={C.q} />
              <Field label="期間（迄）" value="2026-03-31" width="110px" color={C.q} />
              <Field label="群組" value="全部" color={C.q} />
              <Field label="操作類型" value="DELETE / EXPORT" width="130px" color={C.q} />
            </div>
            <Label text="查詢結果 Grid" color={C.q} />
            <Grid headers={["操作者", "作業代號", "操作類型", "筆數", "時間"]}
              rows={[
                ["王小明", "TAMG03", "EXPORT", "245筆", "09:32"],
                ["李大華", "TRMG01", "DELETE", "3筆",  "10:15"],
              ]} color={C.q} />
            <div style={{ fontSize: "10px", color: C.sub, marginTop: "6px" }}>
              範例：SCMQ01 操作稽核查詢 / SCMQ02 簽核進度查詢 / CFMQ01 職能知識庫
            </div>
          </div>
        </Box>
      );
    }

    // ══════════════════════════════════════════════════════════════
    // ── VoucherForm（新增）────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    function VoucherFormDemo() {
      const [docType, setDocType] = useState("JD001");
      const [previewed, setPreviewed] = useState(false);
      const docMap = {
        "JD001": { name: "工作說明書", unit: "業務部", person: "王小明", code: "TAMV01" },
        "PA001": { name: "績效考核",   unit: "業務部", person: "王小明", code: "TRMV01" },
        "NA001": { name: "訓練需求評估", unit: "人資部", person: "陳美玲", code: "LPMV01" },
        "TR001": { name: "課程實施",   unit: "人資部", person: "陳美玲", code: "LPMV03" },
      };
      const doc = docMap[docType];

      return (
        <Box title="VoucherForm　憑證作業" subtitle="V 作業 — 依單據群組管控（非 is_admin）" color={C.v} badge="NEW">
          <Toolbar color={C.v} buttons={[
            { icon: "🖨️", label: "列印" }, { icon: "📤", label: "輸出PDF" }, { icon: "✖️", label: "關閉" },
          ]} />
          <div style={{ background: "#fff", padding: "10px", border: `1px solid ${C.v}33`, borderTop: "none" }}>

            {/* 篩選條件 */}
            <Label text="篩選條件區" color={C.v} />
            <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", marginBottom: "10px" }}>
              <div style={{ display: "flex", flexDirection: "column" }}>
                <span style={{ fontSize: "9px", color: C.sub, marginBottom: "2px" }}>單別（點選切換）</span>
                <select value={docType} onChange={e => { setDocType(e.target.value); setPreviewed(false); }} style={{
                  border: `1px solid ${C.v}66`, borderRadius: "3px",
                  padding: "3px 6px", fontSize: "11px", color: C.v, fontWeight: 700,
                  background: "#fff", cursor: "pointer",
                }}>
                  {Object.keys(docMap).map(k => <option key={k} value={k}>{k}（{docMap[k].name}）</option>)}
                </select>
              </div>
              <Field label="日期（起）" value="2026-04-01" width="110px" color={C.v} />
              <Field label="日期（迄）" value="2026-04-30" width="110px" color={C.v} />
              <div style={{ display: "flex", flexDirection: "column" }}>
                <span style={{ fontSize: "9px", color: C.sub, marginBottom: "2px" }}>狀態</span>
                <div style={{
                  border: `1px solid ${C.v}66`, borderRadius: "3px",
                  padding: "3px 6px", fontSize: "11px",
                  color: "#1B5E20", fontWeight: 700, background: "#E8F5E9",
                }}>CONFIRMED（預設）</div>
              </div>
              <div style={{ display: "flex", alignItems: "flex-end" }}>
                <button onClick={() => setPreviewed(true)} style={{
                  background: C.v, color: "#fff", border: "none",
                  borderRadius: "4px", padding: "4px 12px",
                  fontSize: "11px", fontWeight: 700, cursor: "pointer",
                }}>🔍 查詢預覽</button>
              </div>
            </div>

            {/* 憑證預覽 */}
            <Label text="憑證預覽" color={C.v} />
            <div style={{
              border: `2px solid ${C.v}44`, borderRadius: "6px", padding: "14px 16px",
              background: "#fff", position: "relative", minHeight: "180px",
              opacity: previewed ? 1 : 0.4,
              transition: "opacity 0.3s",
            }}>
              {/* 右上角「核」印章 */}
              <div style={{
                position: "absolute", top: "10px", right: "12px",
                width: "46px", height: "46px", borderRadius: "50%",
                border: "2.5px solid #C62828",
                display: "flex", alignItems: "center", justifyContent: "center",
                background: "#FDECEA",
                boxShadow: "0 0 0 1px #C6282866, inset 0 0 8px #C6282822",
                transform: "rotate(-18deg)",
              }}>
                <span style={{
                  color: "#7B0000", fontSize: "18px", fontWeight: 900,
                  fontFamily: "'Noto Serif TC', serif", letterSpacing: "-1px",
                }}>核</span>
              </div>

              {/* 憑證標題 */}
              <div style={{ textAlign: "center", fontSize: "14px", fontWeight: 700, color: C.navy, marginBottom: "10px" }}>
                【{doc.name}憑證】
              </div>

              {/* 基本資訊 */}
              <div style={{ fontSize: "10px", color: C.text, lineHeight: 2, marginBottom: "8px" }}>
                <div style={{ display: "flex", gap: "24px" }}>
                  <span>單號：<strong>{docType}-20260422-0001</strong></span>
                  <span>作業：<strong>{doc.code}</strong></span>
                </div>
                <div style={{ display: "flex", gap: "24px" }}>
                  <span>部門：{doc.unit}</span>
                  <span>申請人：{doc.person}</span>
                </div>
              </div>

              {/* 簽核欄位 */}
              <div style={{ borderTop: "1px dashed #ccc", paddingTop: "8px" }}>
                <div style={{ fontSize: "10px", fontWeight: 700, color: C.sub, marginBottom: "4px" }}>簽核欄位：</div>
                {[
                  { role: "申請人",   name: doc.person, date: "2026-04-22" },
                  { role: "直屬主管", name: "",          date: "" },
                  { role: "HR 主管",  name: "",          date: "" },
                ].map(({ role, name, date }) => (
                  <div key={role} style={{
                    display: "flex", gap: "12px", alignItems: "center",
                    borderBottom: "1px solid #eee", padding: "4px 0", fontSize: "10px",
                  }}>
                    <span style={{ width: "54px", color: C.sub, fontWeight: 700 }}>{role}</span>
                    <span style={{ width: "70px", borderBottom: "1px solid #aaa", minHeight: "16px", paddingBottom: "1px" }}>{name}</span>
                    <span style={{ color: C.sub }}>日期：</span>
                    <span style={{ width: "70px", borderBottom: "1px solid #aaa", minHeight: "16px", paddingBottom: "1px" }}>{date}</span>
                  </div>
                ))}
              </div>

              {!previewed && (
                <div style={{
                  position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "12px", color: C.v, fontWeight: 700,
                }}>點「查詢預覽」顯示憑證</div>
              )}
            </div>

            {/* 說明 */}
            <div style={{ marginTop: "8px", padding: "6px 8px", background: C.vLt, borderRadius: "4px", fontSize: "10px", color: C.v, lineHeight: 1.7 }}>
              🔴 只顯示自己群組的單據（群組管控，非 is_admin）<br/>
              🔴 只列印 CONFIRMED 狀態的單據（有效憑證）<br/>
              🔴 列印後供親簽，附於會計傳票作為內部憑證
            </div>
            <div style={{ fontSize: "10px", color: C.sub, marginTop: "6px" }}>
              人才價值鏈：CFMV01(JB) / TAMV01(JD) / TRMV01(PA) / TRMV02(PI) / TRMV03(ID) / TRMV04(PP)<br/>
              人才培育鏈：LPMV01(NA) / LPMV02(TP) / LPMV03(TR)
            </div>
          </div>
        </Box>
      );
    }

    // ══════════════════════════════════════════════════════════════
    // ── ReportForm ───────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    function ReportFormDemo() {
      return (
        <Box title="ReportForm　報表作業" subtitle="R 作業 — is_admin=1 才可見" color={C.r}>
          <Toolbar color={C.r} buttons={[
            { icon: "📤", label: "產出Excel" }, { icon: "🖨️", label: "列印PDF" }, { icon: "✖️", label: "關閉" },
          ]} />
          <div style={{ background: "#fff", padding: "10px", border: `1px solid ${C.r}33`, borderTop: "none" }}>
            <Label text="報表參數區" color={C.r} />
            <div style={{ display: "flex", gap: "10px", flexWrap: "wrap", marginBottom: "10px" }}>
              <Field label="考核年度" value="2026" width="80px" color={C.r} />
              <Field label="群組範圍" value="全公司" color={C.r} />
              <Field label="輸出格式" value="Excel" color={C.r} />
            </div>
            <Label text="報表預覽" color={C.r} />
            <div style={{ background: C.rLt, border: `1px solid ${C.r}44`, borderRadius: "4px", padding: "8px" }}>
              <Grid headers={["姓名", "部門", "績效評等", "職能達成率", "訓練時數"]}
                rows={[
                  ["王小明", "業務部", "A",  "87%", "32h"],
                  ["李大華", "製造部", "B+", "79%", "28h"],
                  ["陳美玲", "人資部", "A+", "92%", "40h"],
                ]} color={C.r} />
            </div>
            <div style={{ fontSize: "10px", color: C.sub, marginTop: "6px" }}>
              範例：CFMR01 職能結構報表 / TRMR03 九宮格報表 / LPMR02 效能評鑑報表
            </div>
          </div>
        </Box>
      );
    }

    // ══════════════════════════════════════════════════════════════
    // ── 「核」印章互動展示（新增）────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    function StampDemo() {
      const [selected, setSelected] = useState("CONFIRMED");
      const statuses = [
        { key: "DRAFT",     desc: "建立中，無標記",           color: "#888" },
        { key: "PENDING",   desc: "多簽核等待中，黃色「待核」",color: "#E65100" },
        { key: "CONFIRMED", desc: "已確認，紅色「核」印章",    color: "#1B5E20" },
        { key: "REJECTED",  desc: "已退回，棕色「退」標記",    color: "#5D4037" },
        { key: "CANCELLED", desc: "已作廢，灰色「廢」標記",    color: "#555" },
      ];

      return (
        <Box title="🔴 單據確認狀態標記" subtitle="DocumentForm 專用 — 右上角印章" color={C.v} badge="NEW">
          <div style={{ padding: "4px 0 8px", fontSize: "11px", color: C.sub }}>
            點選左側狀態，觀察右側單據右上角的印章變化：
          </div>
          <div style={{ display: "flex", gap: "14px", flexWrap: "wrap" }}>

            {/* 左：狀態選擇 */}
            <div style={{ display: "flex", flexDirection: "column", gap: "6px", minWidth: "210px" }}>
              {statuses.map(s => (
                <button key={s.key} onClick={() => setSelected(s.key)} style={{
                  background: selected === s.key ? s.color + "14" : "#fff",
                  border: `2px solid ${selected === s.key ? s.color : "#ddd"}`,
                  borderRadius: "6px", padding: "7px 12px", cursor: "pointer",
                  textAlign: "left", transition: "all 0.15s",
                }}>
                  <div style={{ fontSize: "11px", fontWeight: 700, color: s.color }}>{s.key}</div>
                  <div style={{ fontSize: "9px", color: C.sub, marginTop: "1px" }}>{s.desc}</div>
                </button>
              ))}
            </div>

            {/* 右：單據示意 */}
            <div style={{ flex: 1, minWidth: "220px" }}>
              <div style={{
                border: `2px solid ${C.navy}33`, borderRadius: "6px",
                padding: "14px 16px", background: "#fff",
                position: "relative", minHeight: "195px",
              }}>
                <Stamp status={selected} />
                <div style={{ fontSize: "12px", fontWeight: 700, color: C.navy, marginBottom: "8px" }}>
                  JD 工作說明書
                </div>
                <div style={{ fontSize: "10px", color: C.text, lineHeight: 2 }}>
                  <div>單號：JD001-20260422-0001</div>
                  <div>職位：業務專員　部門：業務部</div>
                  <div>群組：台北業務員工</div>
                  <div>
                    狀態：
                    <strong style={{ color: statuses.find(s => s.key === selected)?.color }}>
                      {selected}
                    </strong>
                  </div>
                </div>
                {selected === "CONFIRMED" && (
                  <div style={{ marginTop: "8px", background: "#E8F5E9", borderRadius: "4px", padding: "5px 8px", fontSize: "9px", color: "#2E7D32" }}>
                    ✅ 資料已鎖定，需取消確認才能修改
                  </div>
                )}
                {selected === "PENDING" && (
                  <div style={{ marginTop: "8px", background: "#FFF3E0", borderRadius: "4px", padding: "5px 8px", fontSize: "9px", color: "#E65100" }}>
                    🕐 多簽核流程進行中，等待簽核者確認
                  </div>
                )}
                {selected === "DRAFT" && (
                  <div style={{ marginTop: "8px", background: "#F5F5F5", borderRadius: "4px", padding: "5px 8px", fontSize: "9px", color: "#888" }}>
                    ✏️ 建立中，尚未送出確認
                  </div>
                )}
              </div>
              <div style={{ marginTop: "6px", fontSize: "9px", color: C.sub, textAlign: "center" }}>
                適用：JB / JD / PA / PI / ID / PP / NA / TP / TR（共九支 DocumentForm 作業）
              </div>
            </div>
          </div>
        </Box>
      );
    }

    // ══════════════════════════════════════════════════════════════
    // ── 繼承架構圖 ───────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    function InheritanceChart() {
      const items = [
        { label: "MasterForm",   sub: "G 單檔作業（無單號，如 CFMG01 / TAMG06）",                       color: C.g,    tag: "G" },
        { label: "DocumentForm", sub: "G 單據作業（JB/JD/PA/PI/ID/PP/NA/TP/TR）+ 右上角「核」印章",     color: C.navy, tag: "G" },
        { label: "BatchForm",    sub: "B 批次作業（is_admin=1 才可見）",                                  color: C.b,    tag: "B" },
        { label: "QueryForm",    sub: "Q 查詢作業（is_admin=1 才可見）",                                  color: C.q,    tag: "Q" },
        { label: "VoucherForm",  sub: "V 憑證作業（依單據群組管控，非 is_admin，列印+親簽）",            color: C.v,    tag: "V", isNew: true },
        { label: "ReportForm",   sub: "R 報表作業（is_admin=1 才可見）",                                  color: C.r,    tag: "R" },
      ];
      return (
        <div style={{ background: "#fff", border: `2px solid ${C.navy}`, borderRadius: "8px", padding: "16px", fontFamily: "'Noto Sans TC', Arial, sans-serif" }}>
          <div style={{ fontWeight: 700, color: C.navy, marginBottom: "4px", fontSize: "14px" }}>
            🏛️ BaseForm 繼承架構
          </div>
          <div style={{ fontSize: "10px", color: C.sub, marginBottom: "12px" }}>
            作業類型順序：<strong>G → B → Q → V → R</strong>
          </div>

          {/* BaseForm 根節點 */}
          <div style={{ marginBottom: "8px", display: "flex", alignItems: "center", gap: "8px" }}>
            <div style={{
              background: C.navy + "18", border: `2px solid ${C.navy}`,
              borderRadius: "6px", padding: "5px 14px", fontSize: "12px",
              fontWeight: 700, color: C.navy,
            }}>
              BaseForm（祖先）
              <span style={{ fontWeight: 400, color: C.sub, fontSize: "10px", marginLeft: "10px" }}>
                工具列 / 群組管控 / 操作稽核 / 軟硬刪除 / 狀態列
              </span>
            </div>
          </div>

          {/* 子類 */}
          {items.map(({ label, sub, color, tag, isNew }) => (
            <div key={label} style={{ marginLeft: "24px", marginBottom: "6px", display: "flex", alignItems: "center", gap: "8px" }}>
              <span style={{ color: "#bbb", fontSize: "14px" }}>└──</span>
              <div style={{
                background: color + "14", border: `2px solid ${color}`,
                borderRadius: "6px", padding: "4px 12px", fontSize: "12px",
                fontWeight: 700, color, flex: 1,
                display: "flex", alignItems: "center", justifyContent: "space-between",
              }}>
                <span>
                  {label}
                  <span style={{ fontWeight: 400, color: C.sub, fontSize: "10px", marginLeft: "10px" }}>{sub}</span>
                </span>
                <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                  {isNew && (
                    <span style={{
                      background: color, color: "#fff",
                      borderRadius: "8px", padding: "1px 7px", fontSize: "9px", fontWeight: 700,
                    }}>NEW</span>
                  )}
                  <span style={{
                    background: color + "22", border: `1px solid ${color}`,
                    borderRadius: "4px", padding: "1px 7px", fontSize: "10px", fontWeight: 700, color,
                  }}>{tag}</span>
                </div>
              </div>
            </div>
          ))}

          {/* 說明區 */}
          <div style={{ marginTop: "12px", padding: "8px 10px", background: C.navyLt, borderRadius: "4px", fontSize: "10px", color: C.sub, lineHeight: 1.8 }}>
            <strong style={{ color: C.navy }}>G 作業判斷：</strong>
            有 doc_type（單號）→ DocumentForm　/　無 doc_type → MasterForm<br/>
            <strong style={{ color: C.v }}>V 憑證特則：</strong>
            可見性由單據所屬群組決定，不依賴 is_admin<br/>
            <strong style={{ color: C.navy }}>「核」印章：</strong>
            DocumentForm 狀態 CONFIRMED 時右上角自動出現，取消確認後消失
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════════
    // ── MAIN APP ─────────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════
    const TABS = [
      { id: "all",      label: "全覽",            color: C.navy },
      { id: "inherit",  label: "繼承架構",         color: C.navy },
      { id: "stamp",    label: "「核」印章 🆕",    color: C.v    },
      { id: "master",   label: "MasterForm",      color: C.g    },
      { id: "document", label: "DocumentForm",    color: C.navy },
      { id: "batch",    label: "BatchForm",       color: C.b    },
      { id: "query",    label: "QueryForm",       color: C.q    },
      { id: "voucher",  label: "VoucherForm 🆕",  color: C.v    },
      { id: "report",   label: "ReportForm",      color: C.r    },
    ];

    function App() {
      const [active, setActive] = useState("all");

      return (
        <div style={{ minHeight: "100vh", background: "#F0F4F8", fontFamily: "'Noto Sans TC', Arial, sans-serif", padding: "20px" }}>
          <style>{"@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@700&display=swap');"}</style>
          <div style={{ maxWidth: "900px", margin: "0 auto" }}>

            {/* Header */}
            <div style={{ background: C.navy, color: "#fff", borderRadius: "10px", padding: "16px 24px", marginBottom: "20px" }}>
              <div style={{ fontSize: "11px", opacity: 0.7, marginBottom: "4px", letterSpacing: "0.15em" }}>HPWS 系統設計規範</div>
              <div style={{ fontSize: "20px", fontWeight: 700 }}>1.2.3 介面設計標準</div>
              <div style={{ fontSize: "12px", opacity: 0.8, marginTop: "4px" }}>
                六種介面規範 × BaseForm 繼承架構 × G/B/Q/V/R 作業分類 × 「核」印章狀態標記
              </div>
              <div style={{ marginTop: "10px", display: "flex", gap: "8px", flexWrap: "wrap" }}>
                {[
                  { label: "🆕 VoucherForm V 憑證", color: C.v },
                  { label: "🆕「核」印章狀態標記",  color: C.v },
                  { label: "✅ 九支 DocumentForm", color: C.navy },
                  { label: "📋 G→B→Q→V→R 順序",  color: C.g },
                ].map(b => (
                  <span key={b.label} style={{
                    background: b.color + "44", border: `1px solid ${b.color}88`,
                    borderRadius: "20px", padding: "2px 10px", fontSize: "11px", color: "#fff",
                  }}>{b.label}</span>
                ))}
              </div>
            </div>

            {/* Tab 導覽 */}
            <div style={{ display: "flex", gap: "6px", flexWrap: "wrap", marginBottom: "16px" }}>
              {TABS.map(t => (
                <button key={t.id} onClick={() => setActive(t.id)} style={{
                  padding: "6px 14px", borderRadius: "20px", border: `2px solid ${t.color}`,
                  background: active === t.id ? t.color : "#fff",
                  color: active === t.id ? "#fff" : t.color,
                  fontWeight: 700, fontSize: "12px", cursor: "pointer",
                  fontFamily: "'Noto Sans TC', Arial, sans-serif",
                  transition: "all 0.15s",
                }}>{t.label}</button>
              ))}
            </div>

            {/* 內容 */}
            <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
              {(active === "all" || active === "inherit")  && <InheritanceChart />}
              {(active === "all" || active === "stamp")    && <StampDemo />}
              {(active === "all" || active === "master")   && <MasterFormDemo />}
              {(active === "all" || active === "document") && <DocumentFormDemo />}
              {(active === "all" || active === "batch")    && <BatchFormDemo />}
              {(active === "all" || active === "query")    && <QueryFormDemo />}
              {(active === "all" || active === "voucher")  && <VoucherFormDemo />}
              {(active === "all" || active === "report")   && <ReportFormDemo />}
            </div>
          </div>
        </div>
      );
    }

    // 渲染到 DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
