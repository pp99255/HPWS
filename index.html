<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HPWS 系統設計規範｜1.2.3 介面設計標準</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #F0F4F8;
            font-family: 'Noto Sans TC', Arial, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.4;
            padding: 20px;
        }
        /* 模擬 React 渲染容器 */
        #root {
            max-width: 1020px;
            margin: 0 auto;
        }
        /* 輔助全域樣式 */
        button, select, input {
            font-family: inherit;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        /* 平滑轉場 */
        .stamp-card, .voucher-preview, .demo-box {
            transition: all 0.2s ease;
        }
        /* 自定義滾動條 (輕量) */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e9ecef;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #9aa9b9;
            border-radius: 4px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>

<script>
    // ─────────────────────────────────────────────────────────────
    // 完整移植 React 元件邏輯至純 HTML/JS (使用內建狀態與 DOM 操作)
    // 實作六種介面規範 MasterForm, DocumentForm, BatchForm, QueryForm, VoucherForm, ReportForm
    // 包含「核」印章互動、繼承架構圖、頁籤切換，完全符合原規格，不用任何外部框架。
    // ─────────────────────────────────────────────────────────────

    // 色盤（完整版含 V 憑證）
    const C = {
        navy: "#1F4E79", navyLt: "#D9E2F3",
        scm:  "#2E5090", scmLt:  "#DBEAFE",
        g:    "#2E75B6", gLt:    "#CFE2F3",
        b:    "#C55A00", bLt:    "#FCE4D6",
        q:    "#1A6B3A", qLt:    "#D9F0E3",
        v:    "#922B21", vLt:    "#FDECEA",   // V 憑證 — 深紅
        r:    "#5A2D82", rLt:    "#EDE0F5",
        border: "#BFBFBF", bg: "#F5F5F5",
        text: "#1A1A1A", sub: "#595959",
    };

    // 印章設定
    const STAMP_CONFIG = {
        DRAFT:     null,
        PENDING:   { label: "待核", color: "#7B3F00", bg: "#FFF3E0", border: "#E65100" },
        CONFIRMED: { label: "核",   color: "#7B0000", bg: "#FDECEA", border: "#C62828" },
        REJECTED:  { label: "退",   color: "#4E342E", bg: "#EFEBE9", border: "#8D6E63" },
        CANCELLED: { label: "廢",   color: "#424242", bg: "#F5F5F5", border: "#9E9E9E" },
    };

    // ---------- 共用元件工廠函數 (純 DOM 產生) ----------
    function createToolbar(buttons, color) {
        const div = document.createElement('div');
        div.style.cssText = `background:#E8E8E8; border-bottom:2px solid ${color}; padding:6px 10px; display:flex; gap:6px; flex-wrap:wrap; border-radius:6px 6px 0 0;`;
        buttons.forEach(btn => {
            const button = document.createElement('button');
            button.title = btn.label;
            button.style.cssText = `background:${btn.disabled ? '#ddd' : btn.highlight ? color : '#fff'}; border:1px solid ${btn.disabled ? '#ccc' : color}; border-radius:4px; padding:3px 8px; cursor:${btn.disabled ? 'not-allowed' : 'pointer'}; color:${btn.disabled ? '#aaa' : btn.highlight ? '#fff' : color}; font-size:13px; display:flex; align-items:center; gap:3px;`;
            button.innerHTML = `<span>${btn.icon}</span><span style="font-size:10px">${btn.label}</span>`;
            div.appendChild(button);
        });
        return div;
    }

    function createStamp(status) {
        const s = STAMP_CONFIG[status];
        if (!s) return null;
        const stampDiv = document.createElement('div');
        stampDiv.style.cssText = `position:absolute; top:8px; right:10px; width:44px; height:44px; border-radius:50%; border:2.5px solid ${s.border}; display:flex; align-items:center; justify-content:center; background:${s.bg}; box-shadow:0 0 0 1px ${s.border}55, inset 0 0 6px ${s.border}22; transform:rotate(-18deg); z-index:20;`;
        const span = document.createElement('span');
        span.style.cssText = `color:${s.color}; font-weight:900; font-family:'Noto Serif TC', serif; font-size:${status === 'CONFIRMED' ? '17px' : '12px'}; letter-spacing:${status === 'CONFIRMED' ? '-1px' : '0'}; line-height:1;`;
        span.innerText = s.label;
        stampDiv.appendChild(span);
        return stampDiv;
    }

    function createLabel(text, color) {
        const div = document.createElement('div');
        div.style.cssText = `background:${color}; color:#fff; padding:2px 8px; font-size:10px; font-weight:700; border-radius:3px; display:inline-block; margin-bottom:6px;`;
        div.innerText = text;
        return div;
    }

    function createField(label, value = "___", width = "120px", color = C.g) {
        const container = document.createElement('div');
        container.style.cssText = `display:flex; flex-direction:column; min-width:${width}`;
        const labelSpan = document.createElement('span');
        labelSpan.style.cssText = `font-size:9px; color:${C.sub}; margin-bottom:2px;`;
        labelSpan.innerText = label;
        const valueDiv = document.createElement('div');
        valueDiv.style.cssText = `border:1px solid ${color}66; border-radius:3px; padding:3px 6px; font-size:11px; color:${C.text}; background:#fff; min-width:${width};`;
        valueDiv.innerText = value;
        container.appendChild(labelSpan);
        container.appendChild(valueDiv);
        return container;
    }

    function createGrid(headers, rows, color) {
        const table = document.createElement('table');
        table.style.cssText = "width:100%; border-collapse:collapse; font-size:10px; margin-top:6px;";
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        headers.forEach(h => {
            const th = document.createElement('th');
            th.style.cssText = `background:${color}22; border:1px solid ${color}44; padding:3px 6px; color:${C.text}; font-weight:700; text-align:left;`;
            th.innerText = h;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        rows.forEach((row, idx) => {
            const tr = document.createElement('tr');
            tr.style.background = idx % 2 === 0 ? "#fff" : "#fafafa";
            row.forEach(cell => {
                const td = document.createElement('td');
                td.style.cssText = `border:1px solid ${color}22; padding:3px 6px; color:${C.text};`;
                td.innerText = cell;
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        return table;
    }

    function createTabs(tabs, activeIndex, color, onTabClick) {
        const container = document.createElement('div');
        container.style.cssText = `display:flex; border-bottom:2px solid ${color}; margin-top:10px;`;
        tabs.forEach((tab, i) => {
            const tabDiv = document.createElement('div');
            tabDiv.style.cssText = `padding:4px 12px; font-size:11px; cursor:pointer; background:${i === activeIndex ? color : '#f0f0f0'}; color:${i === activeIndex ? '#fff' : C.sub}; border-radius:4px 4px 0 0; margin-right:3px; border:1px solid ${color}; border-bottom:none;`;
            tabDiv.innerText = tab;
            tabDiv.addEventListener('click', () => onTabClick(i));
            container.appendChild(tabDiv);
        });
        return container;
    }

    function createBox(title, subtitle, color, children, badge = null) {
        const box = document.createElement('div');
        box.style.cssText = `border:2px solid ${color}; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px ${color}22; font-family:'Noto Sans TC', Arial, sans-serif; margin-bottom:20px;`;
        const header = document.createElement('div');
        header.style.cssText = `background:${color}; color:#fff; padding:6px 12px; display:flex; justify-content:space-between; align-items:center;`;
        const leftGroup = document.createElement('div');
        leftGroup.style.cssText = "display:flex; align-items:center; gap:8px;";
        const titleSpan = document.createElement('span');
        titleSpan.style.fontWeight = 700;
        titleSpan.style.fontSize = "13px";
        titleSpan.innerText = title;
        leftGroup.appendChild(titleSpan);
        if (badge) {
            const badgeSpan = document.createElement('span');
            badgeSpan.style.cssText = `background:#fff3; border:1px solid #fff8; border-radius:10px; padding:1px 8px; font-size:10px; font-weight:700;`;
            badgeSpan.innerText = badge;
            leftGroup.appendChild(badgeSpan);
        }
        const subtitleSpan = document.createElement('span');
        subtitleSpan.style.cssText = "font-size:10px; opacity:0.85;";
        subtitleSpan.innerText = subtitle;
        header.appendChild(leftGroup);
        header.appendChild(subtitleSpan);
        const content = document.createElement('div');
        content.style.cssText = "padding:10px 12px; background:#fafafa;";
        content.appendChild(children);
        box.appendChild(header);
        box.appendChild(content);
        return box;
    }

    // ---------- 各表單 Demo 實體 (回傳 HTMLElement) ----------
    function MasterFormDemo() {
        const container = document.createElement('div');
        const toolbar = createToolbar([
            { icon: "➕", label: "新增" }, { icon: "✏️", label: "修改" }, { icon: "🗑️", label: "刪除" }, { icon: "📋", label: "複製" },
            { icon: "🔍", label: "查詢" }, { icon: "📤", label: "輸出" }, { icon: "🖨️", label: "列印" }, { icon: "✖️", label: "關閉" }
        ], C.g);
        container.appendChild(toolbar);
        const innerDiv = document.createElement('div');
        innerDiv.style.cssText = `background:#fff; padding:10px; border:1px solid ${C.g}33; border-top:none;`;
        innerDiv.appendChild(createLabel("主資料區", C.g));
        const fieldsRow = document.createElement('div');
        fieldsRow.style.cssText = "display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;";
        fieldsRow.appendChild(createField("代碼", "EMP-001", "120px", C.g));
        fieldsRow.appendChild(createField("姓名", "王小明", "120px", C.g));
        fieldsRow.appendChild(createField("部門", "業務部", "120px", C.g));
        fieldsRow.appendChild(createField("職稱", "業務專員", "120px", C.g));
        innerDiv.appendChild(fieldsRow);

        let activeTab = 0;
        const tabContainer = createTabs(["頁籤一 基本資料", "頁籤二 職務資訊", "頁籤三 薪酬", "頁籤四 緊急聯絡"], activeTab, C.g, (idx) => {
            activeTab = idx;
            refreshGridArea();
        });
        innerDiv.appendChild(tabContainer);
        const gridWrapper = document.createElement('div');
        gridWrapper.style.cssText = `border:1px solid ${C.g}33; padding:8px; border-top:none; background:#fff;`;

        function refreshGridArea() {
            gridWrapper.innerHTML = '';
            const headers = ["欄位A", "欄位B", "欄位C", "備註"];
            const rows = [["資料1", "資料2", "資料3", "—"], ["資料4", "資料5", "資料6", "—"]];
            gridWrapper.appendChild(createGrid(headers, rows, C.g));
        }
        refreshGridArea();
        innerDiv.appendChild(gridWrapper);

        const footerNote = document.createElement('div');
        footerNote.style.cssText = `font-size:10px; color:${C.sub}; margin-top:6px;`;
        footerNote.innerText = "範例：CFMG01 系統共用參數 / TAMG06 員工基本資料 / LPMG01 師資建立";
        innerDiv.appendChild(footerNote);
        container.appendChild(innerDiv);
        return createBox("MasterForm　單檔作業", "G 作業 — 無單號", C.g, container);
    }

    function DocumentFormDemo() {
        let status = "DRAFT";
        const container = document.createElement('div');
        const toolbar = createToolbar([
            { icon: "➕", label: "新增" }, { icon: "✏️", label: "修改" }, { icon: "🗑️", label: "刪除" }, { icon: "🔍", label: "查詢" },
            { icon: "📤", label: "輸出" }, { icon: "🖨️", label: "列印" }, { icon: "✅", label: "確認", highlight: true },
            { icon: "↩️", label: "取消確認" }, { icon: "🗂️", label: "作廢" }, { icon: "✖️", label: "關閉" }
        ], C.navy);
        container.appendChild(toolbar);
        const innerDiv = document.createElement('div');
        innerDiv.style.cssText = `background:#fff; padding:10px; border:1px solid ${C.navy}33; border-top:none; position:relative;`;
        
        const stampContainer = document.createElement('div');
        stampContainer.style.position = 'relative';
        function updateStamp() {
            const oldStamp = innerDiv.querySelector('.stamp-holder');
            if(oldStamp) oldStamp.remove();
            const stampEl = createStamp(status);
            if(stampEl) {
                stampEl.classList.add('stamp-holder');
                innerDiv.appendChild(stampEl);
            }
        }
        innerDiv.appendChild(createLabel("單頭區", C.navy));
        const headFields = document.createElement('div');
        headFields.style.cssText = "display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px;";
        headFields.appendChild(createField("單別", "JD001", "100px", C.navy));
        headFields.appendChild(createField("單號", "JD001-20260422-0001", "175px", C.navy));
        headFields.appendChild(createField("群組", "台北業務員工", "120px", C.navy));
        const statusSelectDiv = document.createElement('div');
        statusSelectDiv.style.display = 'flex';
        statusSelectDiv.style.flexDirection = 'column';
        const statusLabel = document.createElement('span');
        statusLabel.style.cssText = `font-size:9px; color:${C.sub}; margin-bottom:2px;`;
        statusLabel.innerText = "狀態（點選體驗印章）";
        const select = document.createElement('select');
        select.style.cssText = `border:1px solid ${C.navy}66; border-radius:3px; padding:3px 6px; font-size:11px; font-weight:700; background:#fff; cursor:pointer;`;
        ["DRAFT","PENDING","CONFIRMED","REJECTED","CANCELLED"].forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.innerText = s;
            select.appendChild(opt);
        });
        select.value = status;
        select.addEventListener('change', (e) => {
            status = e.target.value;
            updateStamp();
            renderStatusHint();
        });
        statusSelectDiv.appendChild(statusLabel);
        statusSelectDiv.appendChild(select);
        headFields.appendChild(statusSelectDiv);
        innerDiv.appendChild(headFields);
        innerDiv.appendChild(createLabel("主資料區", C.navy));
        const mainFields = document.createElement('div');
        mainFields.style.cssText = "display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;";
        mainFields.appendChild(createField("職位", "業務專員", "100px", C.navy));
        mainFields.appendChild(createField("部門", "業務部", "100px", C.navy));
        mainFields.appendChild(createField("直屬主管", "李主管", "100px", C.navy));
        innerDiv.appendChild(mainFields);
        innerDiv.appendChild(createLabel("單身區（明細）", C.navy));
        const grid = createGrid(["序", "KSAO 科目", "說明", "權重", "操作"], [
            ["1", "K001 市場分析", "了解市場動態", "20%", "✏️ 🗑️"],
            ["2", "S012 簡報技巧", "客戶簡報能力", "15%", "✏️ 🗑️"],
            ["3", "A003 溝通協調", "跨部門協作", "15%", "✏️ 🗑️"]
        ], C.navy);
        innerDiv.appendChild(grid);

        const statusFlowDiv = document.createElement('div');
        statusFlowDiv.style.cssText = "margin-top:10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;";
        const flowTitle = document.createElement('span');
        flowTitle.style.cssText = `font-size:10px; color:${C.sub};`;
        flowTitle.innerText = "狀態流程：";
        statusFlowDiv.appendChild(flowTitle);
        const statusColors = { DRAFT:"#888", PENDING:"#E65100", CONFIRMED:"#1B5E20", REJECTED:"#5D4037", CANCELLED:"#555" };
        Object.entries(statusColors).forEach(([s, c], idx, arr) => {
            const badgeSpan = document.createElement('span');
            badgeSpan.style.cssText = `background:${c}18; border:1.5px solid ${c}; border-radius:4px; padding:1px 7px; font-size:10px; font-weight:700; color:${c};`;
            badgeSpan.innerText = s;
            statusFlowDiv.appendChild(badgeSpan);
            if(idx < arr.length-1) {
                const arrow = document.createElement('span');
                arrow.style.cssText = "color:#ccc; font-size:10px;";
                arrow.innerText = "→";
                statusFlowDiv.appendChild(arrow);
            }
        });
        innerDiv.appendChild(statusFlowDiv);

        const hintDiv = document.createElement('div');
        hintDiv.style.cssText = "margin-top:8px; padding:5px 8px; background:#E8F5E9; border-radius:4px; font-size:10px; color:#2E7D32;";
        hintDiv.innerText = '💡 「狀態」切換 CONFIRMED → 右上角出現「核」印章；切換 CANCELLED → 出現「廢」標記';
        innerDiv.appendChild(hintDiv);
        const cancelHint = document.createElement('div');
        cancelHint.style.cssText = "margin-top:4px; padding:5px 8px; background:#FBE9E7; border-radius:4px; font-size:10px; color:#BF360C;";
        cancelHint.innerText = '🗂️ 作廢按鈕：CONFIRMED → CANCELLED（永久廢止，不可恢復）';
        innerDiv.appendChild(cancelHint);
        const footerNote = document.createElement('div');
        footerNote.style.cssText = `font-size:10px; color:${C.sub}; margin-top:6px;`;
        footerNote.innerText = '人才價值鏈：CFMG07(JB) / TAMG03(JD) / TRMG01(PA) / TRMG03(PI) / TRMG04(ID) / TRMG05(PP)  人才培育鏈：LPMG10(NA) / LPMG11(TP) / LPMG12(TR)';
        innerDiv.appendChild(footerNote);
        
        function renderStatusHint() {}
        updateStamp();
        container.appendChild(innerDiv);
        return createBox("DocumentForm　單據作業", "G 作業 — 有單號（JB/JD/PA/PI/ID/PP/NA/TP/TR）", C.navy, container);
    }

    function BatchFormDemo() {
        const container = document.createElement('div');
        const toolbar = createToolbar([{ icon: "▶️", label: "執行" }, { icon: "📤", label: "輸出結果" }, { icon: "✖️", label: "關閉" }], C.b);
        container.appendChild(toolbar);
        const inner = document.createElement('div');
        inner.style.cssText = `background:#fff; padding:10px; border:1px solid ${C.b}33; border-top:none;`;
        inner.appendChild(createLabel("執行條件區", C.b));
        const condRow = document.createElement('div');
        condRow.style.cssText = "display:flex; gap:10px; margin-bottom:10px;";
        condRow.appendChild(createField("執行期間", "2026-01 ~ 2026-03", "150px", C.b));
        condRow.appendChild(createField("群組範圍", "全公司", "120px", C.b));
        condRow.appendChild(createField("處理模式", "全量更新", "120px", C.b));
        inner.appendChild(condRow);
        inner.appendChild(createLabel("執行預覽", C.b));
        const previewDiv = document.createElement('div');
        previewDiv.style.cssText = `background:${C.bLt}; border:1px solid ${C.b}44; border-radius:4px; padding:8px; margin-bottom:10px; font-size:11px;`;
        previewDiv.innerHTML = `<div>將處理資料：<strong>342 筆</strong></div><div style="color:#C00; margin-top:4px;">⚠️ 執行後資料將無法還原，請確認後再執行。</div>`;
        inner.appendChild(previewDiv);
        inner.appendChild(createLabel("執行結果", C.b));
        const resultDiv = document.createElement('div');
        resultDiv.style.cssText = "display:flex; gap:16px; font-size:11px;";
        resultDiv.innerHTML = `<span style="color:#1B5E20">✅ 成功：338 筆</span><span style="color:#C00">⚠️ 失敗：4 筆</span>`;
        inner.appendChild(resultDiv);
        const footer = document.createElement('div');
        footer.style.cssText = `font-size:10px; color:${C.sub}; margin-top:6px;`;
        footer.innerText = "範例：SCMB01 權限複製 / SCMB02 歷史清除 / CFMB01 職務說明書開帳";
        inner.appendChild(footer);
        container.appendChild(inner);
        return createBox("BatchForm　批次作業", "B 作業 — is_admin=1 才可見", C.b, container);
    }

    function QueryFormDemo() {
        const container = document.createElement('div');
        const toolbar = createToolbar([{ icon: "🔍", label: "查詢" }, { icon: "📤", label: "輸出Excel" }, { icon: "🖨️", label: "列印" }, { icon: "✖️", label: "關閉" }], C.q);
        container.appendChild(toolbar);
        const inner = document.createElement('div');
        inner.style.cssText = `background:#fff; padding:10px; border:1px solid ${C.q}33; border-top:none;`;
        inner.appendChild(createLabel("查詢條件區", C.q));
        const filterRow = document.createElement('div');
        filterRow.style.cssText = "display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;";
        filterRow.appendChild(createField("期間（起）", "2026-01-01", "110px", C.q));
        filterRow.appendChild(createField("期間（迄）", "2026-03-31", "110px", C.q));
        filterRow.appendChild(createField("群組", "全部", "100px", C.q));
        filterRow.appendChild(createField("操作類型", "DELETE / EXPORT", "130px", C.q));
        inner.appendChild(filterRow);
        inner.appendChild(createLabel("查詢結果 Grid", C.q));
        const grid = createGrid(["操作者", "作業代號", "操作類型", "筆數", "時間"], [
            ["王小明", "TAMG03", "EXPORT", "245筆", "09:32"],
            ["李大華", "TRMG01", "DELETE", "3筆", "10:15"]
        ], C.q);
        inner.appendChild(grid);
        const footer = document.createElement('div');
        footer.style.cssText = `font-size:10px; color:${C.sub}; margin-top:6px;`;
        footer.innerText = "範例：SCMQ01 操作稽核查詢 / SCMQ02 簽核進度查詢 / CFMQ01 職能知識庫";
        inner.appendChild(footer);
        container.appendChild(inner);
