<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HPWS Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;800&family=Noto+Serif+TC:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',Arial,sans-serif;background:#F0F4F8;height:100vh;display:flex;flex-direction:column;overflow:hidden;color:#1A1A1A}

/* 封面 */
#cover{position:fixed;inset:0;z-index:999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity .5s}
#cover.out{opacity:0;pointer-events:none}
#cover img{max-width:88%;max-height:80vh;border-radius:14px;box-shadow:0 4px 32px rgba(0,0,0,.12)}
#cover-hint{margin-top:24px;font-size:13px;color:#595959;letter-spacing:.15em;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

/* 頂部 */
.topbar{height:46px;background:#1F4E79;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#2E5090,#1A6B3A);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;font-family:'Noto Serif TC',serif}
.sys-name{font-size:13px;font-weight:700;color:#fff}
.sys-sub{font-size:10px;color:#D9E2F3}
.badge{padding:2px 10px;border-radius:20px;background:#1A6B3A33;border:1px solid #1A6B3A88;font-size:10px;color:#81C784;font-weight:700;margin-left:auto}

/* 主體 */
.body{display:flex;flex:1;overflow:hidden}

/* 左側選單 */
.sidebar{width:196px;flex-shrink:0;background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto;display:flex;flex-direction:column}
.sb-hd{padding:8px 14px 4px;font-size:9px;color:#888;letter-spacing:.15em;font-weight:700;border-bottom:1px solid #f0f0f0}
.sb-row{padding:10px 14px;cursor:pointer;border-left:4px solid transparent;transition:all .18s}
.sb-row:hover{background:#f5f7fa}
.sb-row.on{border-left-color:var(--c);background:var(--lt)}
.sb-row.on .sb-name{color:#1A1A1A}
.sb-row.on .sb-desc{color:#555}
.sb-row.on .sb-dot{background:var(--c)}
.sb-name{font-size:12px;font-weight:700;color:#1A1A1A;letter-spacing:.02em}
.sb-desc{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.sb-dot{width:6px;height:6px;border-radius:50%;background:#ccc;flex-shrink:0;margin-top:4px;transition:background .18s}

/* 內容區 */
.content{flex:1;overflow-y:auto;min-width:0}

/* HCM001 色塊 */
.hw1-wrap{padding:20px 24px}
.hw1-title-area{margin-bottom:16px}
.hw1-eyebrow{font-size:10px;color:#888;letter-spacing:.2em;font-weight:700;margin-bottom:4px}
.hw1-h{font-size:20px;font-weight:800;color:#1F4E79;font-family:'Noto Serif TC',serif}
.hw1-sub{font-size:11px;color:#888;margin-top:2px}
.pyramid{display:flex;flex-direction:column;gap:8px;max-width:620px}
.pyr-block{border-radius:10px;padding:16px 20px;cursor:pointer;transition:all .18s;border:1.5px solid transparent}
.pyr-block:hover{filter:brightness(.96)}
.pyr-title{font-size:15px;font-weight:800;font-family:'Noto Serif TC',serif;margin-bottom:4px}
.pyr-sub{font-size:12px;opacity:.75}
.pyr-row4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pyr-cell{border-radius:10px;padding:14px 12px;cursor:pointer;transition:all .18s;border:1.5px solid transparent}
.pyr-cell:hover{filter:brightness(.96)}
.pyr-cell-title{font-size:13px;font-weight:800;font-family:'Noto Serif TC',serif;margin-bottom:5px}
.pyr-cell-sub{font-size:10px;opacity:.72;line-height:1.5}

/* 模組頁面 */
.mod-wrap{padding:16px}

/* 模組 Header */
.mod-hdr{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:14px;border:1px solid #e0e0e0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.mod-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.mod-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;font-family:'Noto Serif TC',serif;flex-shrink:0}
.mod-htag{font-size:10px;letter-spacing:.1em;margin-bottom:2px}
.mod-title{font-size:16px;font-weight:800;font-family:'Noto Serif TC',serif}
.mod-en{font-size:11px;color:#888}
.mod-desc{font-size:12px;color:#888;margin-top:3px}
.mod-stats{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.stat-pill{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;border-width:1px;border-style:solid}

/* 主 Tab（流程圖/作業清單）*/
.main-tabs{display:flex;border-bottom:2px solid #e0e0e0;background:#fff;border-radius:8px 8px 0 0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:14px}
.main-tab{padding:9px 20px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:#888;background:#fff;border:none;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s}
.main-tab:hover{background:#f5f5f5;color:#1A1A1A}
.main-tab.on{color:var(--mc);border-bottom-color:var(--mc)}
.cnt-badge{font-size:10px;padding:1px 6px;border-radius:9px;font-weight:800}

/* 流程圖區 */
.flow-box{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e0e0e0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.flow-stat-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.flow-stat-label{font-size:10px;color:#888;font-weight:700}
.flow-stat-pill{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:800;border-width:1px;border-style:solid}
.flow-stat-sep{font-size:10px;color:#BFBFBF}
.ftabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.ftab{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border-width:1px;border-style:solid;background:#fff;font-family:inherit;transition:all .15s;white-space:nowrap}
.ftab:hover{opacity:.85}
.flow-svg-area{overflow-x:auto}
.flow-svg-area svg{display:block}
.fleg{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0}
.fleg-i{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.fleg-d{width:12px;height:8px;border-radius:2px;border:1px solid #e0e0e0}
.f-node{cursor:pointer}
.f-node:hover rect,.f-node:hover ellipse,.f-node:hover polygon{opacity:.82}

/* 作業清單 */
.type-sec{margin-bottom:12px}
.type-hdr{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.type-pill{padding:2px 10px;border-radius:5px;font-size:11px;font-weight:800;border-width:1px;border-style:solid}
.type-desc{font-size:11px;color:#888}
.type-line{flex:1;height:1px;background:#e0e0e0}
.op-grid{display:flex;flex-wrap:wrap;gap:6px}
.op-card{padding:8px 12px;border-radius:7px;cursor:pointer;background:#fff;border:1px solid #e0e0e0;min-width:164px;max-width:208px;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.op-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.op-code{font-size:11px;font-weight:800}
.op-name{font-size:11px;color:#1A1A1A;margin-top:2px}
.op-hint{font-size:9px;color:#888;margin-top:2px}

/* 第三層面板 */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;opacity:0;transition:opacity .3s;backdrop-filter:blur(2px)}
#ov.vis{opacity:1}
#panel{position:fixed;top:0;right:0;bottom:0;width:680px;max-width:96vw;background:#fff;z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:-3px 0 20px rgba(0,0,0,.12)}
#panel.vis{transform:translateX(0)}
.ph{padding:11px 16px;border-bottom:2px solid var(--tc);display:flex;justify-content:space-between;align-items:center}
.ph-tags{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ph-tag{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;color:#fff}
.ph-title{font-size:15px;font-weight:700}
.p-close{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:5px 12px;color:#888;cursor:pointer;font-size:11px;font-family:inherit}
.p-close:hover{background:#f5f5f5}
.ptb{padding:5px 9px;background:#E8E8E8;border-bottom:2px solid var(--tc);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.ptb-btn{padding:3px 8px;border-radius:4px;font-size:10px;background:#fff;border-width:1px;border-style:solid;cursor:pointer;font-family:inherit}
.pb{flex:1;overflow-y:auto;padding:13px 15px}
.pf{padding:6px 14px;border-top:1px solid #e0e0e0;display:flex;justify-content:space-between;font-size:10px;color:#888;background:#f9f9f9;flex-shrink:0}
.lbl{display:inline-block;color:#fff;padding:2px 7px;font-size:10px;font-weight:700;border-radius:3px;margin-bottom:5px}
.fld-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.fld{display:flex;flex-direction:column}
.fld-l{font-size:9px;color:#888;margin-bottom:2px}
.fld-v{padding:3px 7px;border-radius:3px;font-size:11px;background:#fff;border:1px solid #e0e0e0}
.itabs{display:flex;border-bottom-width:2px;border-bottom-style:solid;margin-top:7px}
.itab{padding:4px 11px;font-size:11px;cursor:pointer;border-radius:4px 4px 0 0;margin-right:2px;border:1px solid #e0e0e0;border-bottom:none;background:#f0f0f0;color:#888;font-family:inherit}
.itab.on{color:#fff}
.itab-body{border:1px solid #e0e0e0;border-top:none;padding:8px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:3px 6px;text-align:left;font-weight:700}
td{padding:3px 6px;border:1px solid #e0e0e0}
tr:nth-child(even) td{background:#fafafa}
.st-sel{border-radius:3px;padding:3px 7px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #e0e0e0;font-family:inherit}
.stamp{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:rotate(-18deg);font-weight:900;font-family:'Noto Serif TC',serif}
.note-g{padding:5px 8px;border-radius:4px;font-size:10px;background:#E8F5E9;color:#2E7D32;margin-top:7px}
.ex-box{padding:10px 12px;border-radius:6px;margin-bottom:8px;border:1px solid #e0e0e0;background:#f5f5f5}
.ex-warn{padding:10px 12px;border-radius:6px;margin-bottom:8px;border:1px solid #ffcc8055;background:#FFF8F0}
</style>
</head>
<body>

<!-- 封面 -->
<div id="cover" onclick="enter()">
  <img src="title.jpg" onerror="this.style.display='none';document.getElementById('cvfb').style.display='flex'" alt="HPWS" style="max-width:88%;max-height:80vh;border-radius:14px;box-shadow:0 4px 32px rgba(0,0,0,.12)"/>
  <div id="cvfb" style="display:none;flex-direction:column;align-items:center;gap:20px;padding:40px;text-align:center">
    <div style="font-size:40px;font-weight:900;color:#1F4E79;font-family:'Noto Serif TC',serif;line-height:1.3">驅動系統的三大國際標準引擎</div>
    <div style="font-size:17px;color:#595959">流程、績效與人才的三軸聯動</div>
    <div style="display:flex;gap:20px;margin-top:8px">
      <div style="padding:16px 20px;border:2px solid #2E75B6;border-radius:12px;background:#2E75B611;text-align:center">
        <div style="font-size:11px;color:#2E75B6;font-weight:800">Z-Axis</div>
        <div style="font-size:18px;font-weight:900;color:#2E75B6;margin:3px 0">ISO 9001</div>
        <div style="font-size:10px;color:#888">流程軸</div>
      </div>
      <div style="padding:16px 20px;border:2px solid #00695C;border-radius:12px;background:#00695C11;text-align:center">
        <div style="font-size:11px;color:#00695C;font-weight:800">X-Axis</div>
        <div style="font-size:18px;font-weight:900;color:#00695C;margin:3px 0">BSC</div>
        <div style="font-size:10px;color:#888">績效軸</div>
      </div>
      <div style="padding:16px 20px;border:2px solid #B8400A;border-radius:12px;background:#B8400A11;text-align:center">
        <div style="font-size:11px;color:#B8400A;font-weight:800">Y-Axis</div>
        <div style="font-size:18px;font-weight:900;color:#B8400A;margin:3px 0">TTQS</div>
        <div style="font-size:10px;color:#888">人才軸</div>
      </div>
    </div>
  </div>
  <div id="cover-hint">點擊任意處進入系統</div>
</div>

<!-- 頂部 -->
<div class="topbar">
  <img src="logo.jpg" style="width:30px;height:30px;border-radius:8px;object-fit:cover;flex-shrink:0"
    onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'"
    alt="logo"/>
  <div id="logo-fallback" style="display:none;width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#2E5090,#1A6B3A);align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;font-family:'Noto Serif TC',serif;flex-shrink:0">績</div>
  <div>
    <div class="sys-name">社團法人台灣策略與績效管理學會</div>
    <div class="sys-sub">Taiwan Strategy and Performance Management Association</div>
  </div>
  <div style="display:flex;gap:6px;margin-left:auto;">
    <button onclick="setLang('zh-TW')" id="btn-zhTW"
      style="padding:4px 10px;border-radius:6px;border:1.5px solid #ccc;background:#fff;color:#555;font-size:11px;font-weight:700;cursor:pointer;">繁中</button>
    <button onclick="setLang('zh-CN')" id="btn-zhCN"
      style="padding:4px 10px;border-radius:6px;border:1.5px solid #2E5090;background:#2E5090;color:#fff;font-size:11px;font-weight:700;cursor:pointer;">简中</button>
    <button onclick="setLang('en')" id="btn-en"
      style="padding:4px 10px;border-radius:6px;border:1.5px solid #2E5090;background:#2E5090;color:#fff;font-size:11px;font-weight:700;cursor:pointer;">EN</button>
  </div>
</div>

<!-- 主體 -->
<div class="body">
  <div class="sidebar" id="sb">
    <div class="sb-hd" style="padding:14px 16px 10px;font-size:10px;color:#888;letter-spacing:.18em;font-weight:700;border-bottom:1px solid #eee">SYSTEM MODULES</div>
  </div>
  <div class="content" id="ct"></div>
</div>

<!-- 第三層面板 -->
<div id="ov" onclick="closePan()"></div>
<div id="panel">
  <div class="ph" id="ph">
    <div><div class="ph-tags" id="ph-tags"></div><div class="ph-title" id="ph-title"></div></div>
    <button class="p-close" onclick="closePan()">✕ 關閉</button>
  </div>
  <div class="ptb" id="ptb"></div>
  <div class="pb" id="pb"></div>
  <div class="pf" id="pf"></div>
</div>

let currentLang='zh-TW';
const t=key=>STRINGS[currentLang]?.[key]??key;
const getOpsName=code=>OPS_TRANS[currentLang]?.[code]||OPS_TRANS['zh-TW']?.[code]||code;

function setLang(lang){
  currentLang=lang;
  ['zh-TW','zh-CN','en'].forEach(l=>{
    const btn=document.getElementById('btn-'+l.replace('-',''));
    if(btn){
      btn.style.background=l===lang?'#fff':'#2E5090';
      btn.style.color=l===lang?'#555':'#fff';
      btn.style.borderColor=l===lang?'#ccc':'#2E5090';
    }
  });
  // 更新登入視窗
  const refs=[
    ['loginModal .login-brand','login.brand'],
    ['loginModal .login-title','login.title'],
    ['loginModal .login-user-label','login.user'],
    ['loginModal .login-pass-label','login.pass'],
    ['loginModal .login-cancel','login.cancel'],
    ['loginModal .login-confirm','login.confirm'],
  ];
  refs.forEach(([sel,key])=>{
    const el=document.querySelector('#'+sel);
    if(el) el.textContent=t(key);
  });
  const ui=document.getElementById('loginUser');
  const pi=document.getElementById('loginPass');
  if(ui) ui.placeholder=t('login.ph.user');
  if(pi) pi.placeholder=t('login.ph.pass');
  // 更新 hw1
  const e1=document.getElementById('hw1-eyebrow');
  const e2=document.getElementById('hw1-title');
  const e3=document.getElementById('hw1-sub');
  if(e1) e1.textContent=t('hcm001.eyebrow');
  if(e2) e2.textContent=t('hcm001.title');
  if(e3) e3.textContent=t('hcm001.sub');
  // 更新 sidebar
  document.querySelectorAll('.sb-name').forEach(el=>{
    const id=el.closest('.sb-row')?.id?.replace('sb-','');
    if(id){
      const item=ALL.find(a=>a.id===id);
      el.textContent=(item?.code||'')+'　'+(t('mod.'+id+'.name')||item?.name||'');
    }
  });
  // 重新渲染當前模組
  if(_curMod&&_curMod!=='hcm001') renderMod(_curMod,_curTab||'flow');
  else if(_curMod==='hcm001') renderHW1();
}

function enter(){ showLogin(); }
function showLogin(){
  const m=document.getElementById('loginModal');
  m.style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginErr').textContent='';
  setTimeout(()=>document.getElementById('loginUser').focus(),100);
}
function closeLogin(){
  document.getElementById('loginModal').style.display='none';
}
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  if(u==='admin'&&p==='88405358'){
    document.getElementById('loginModal').style.display='none';
    const cv=document.getElementById('cover');
    cv.classList.add('out');
    setTimeout(()=>cv.style.display='none',500);
    initSB(); show('hcm001'); setLang('zh-TW');
  } else {
    document.getElementById('loginErr').textContent='帳號或密碼錯誤，請重新輸入。';
    document.getElementById('loginPass').value='';
    document.getElementById('loginPass').focus();
  }
}

function initSB(){
  const sb=document.getElementById('sb');
  ALL.forEach(item=>{
    const d=document.createElement('div');
    d.className='sb-row'; d.id='sb-'+item.id;
    d.style.setProperty('--c', item.color);
    d.style.setProperty('--lt', item.lt||item.color+'22');
    d.innerHTML=`<div style="display:flex;align-items:flex-start;gap:8px">
      <div class="sb-dot" style="margin-top:4px"></div>
      <div style="flex:1;min-width:0">
        <div class="sb-name">${item.code}　${item.name}</div>
        <div class="sb-desc">${item.en||item.desc}</div>
      </div>
    </div>`;
    d.onclick=()=>show(item.id);
    sb.appendChild(d);
  });
}
function setSB(id){
  document.querySelectorAll('.sb-row').forEach(r=>r.classList.remove('on'));
  const el=document.getElementById('sb-'+id);
  if(el)el.classList.add('on');
}

function renderMod(id, tab){
  _curMod=id; _curTab=tab;
  const m=MODS[id];
  const types=Object.keys(m.ops);
  const totalOps=types.reduce((s,t)=>s+m.ops[t].length,0);

  // 模組 header
  const stats=types.map(t=>`<div class="stat-pill" style="background:${TC[t].lt};border-color:${TC[t].color}55;color:${TC[t].color}">${TC[t].label} ${m.ops[t].length}</div>`).join('');
  const hdr=`<div class="mod-hdr">
    <div class="mod-top">
      <div class="mod-icon" style="background:${m.color}">${m.code}</div>
      <div>
        <div class="mod-htag" style="color:${m.color}">${m.hpw}　${t("mod.layer2")}</div>
        <div class="mod-title" style="color:#1A1A1A">${t("mod."+id+".name")||m.name}（${m.code}）</div>
        <div class="mod-en">${m.en}</div>
      </div>
    </div>
    <div class="mod-desc">${t("mod."+id+".desc")||m.desc}</div>
    <div class="mod-stats">${stats}</div>
  </div>`;

  // 主 Tab
  // 流程圖：取得該模組的 tab 數量
  const flowTabs = FLOW_TABS[id] || [];
  const flowCount = flowTabs.length - 1; // 不含概覽

  const mainTabs=`<div class="main-tabs" style="--mc:${m.color}">
    <button class="main-tab${tab==='flow'?' on':''}" onclick="renderMod('${id}','flow')">
      ${t("ui.tab.flow")}
      <span class="cnt-badge" style="background:${m.color}22;color:${m.color};border:1px solid ${m.color}44">${flowCount}</span>
    </button>
    <button class="main-tab${tab==='ops'?' on':''}" onclick="renderMod('${id}','ops')">
      ${t("ui.tab.ops")}
      <span class="cnt-badge" style="background:${m.color}22;color:${m.color};border:1px solid ${m.color}44">${totalOps}</span>
    </button>
  </div>`;

  const body = tab==='flow' ? renderFlowArea(id) : renderOps(id);
  document.getElementById('ct').innerHTML=`<div class="mod-wrap">${hdr}${mainTabs}${body}</div>`;
}

function renderFlowArea(id){
  const m=MODS[id];
  const tabs=FLOW_TABS[id]||[];
  if(!_curFlow[id]) _curFlow[id]=tabs[0]?tabs[0][0]:'';
  const curFid=_curFlow[id];

  const ftabHtml=tabs.map(([fid,label])=>{
    const on=fid===curFid;
    return `<button class="ftab" data-fid="${fid}" data-mod="${id}"
      style="background:${on?m.color:'#fff'};color:${on?'#fff':m.color};border-color:${on?m.color:m.color+'44'}"
      onclick="swFlow('${id}','${fid}')">${t("ftab."+fid)||label}</button>`;
  }).join('');

  const svgHtml=getSVG(id,curFid);

  return `<div class="flow-box">
    <div class="ftabs">${ftabHtml}</div>
    <div class="flow-svg-area" id="fsvg-${id}">${svgHtml}</div>
    <div class="fleg">
      <div class="fleg-i"><div class="fleg-d" style="background:#bfdbfe;border-color:#60a5fa"></div>${t("leg.start")}</div>
      <div class="fleg-i"><div class="fleg-d" style="background:#dbeafe;border-color:#93c5fd"></div>${t("leg.op")}</div>
      <div class="fleg-i"><div class="fleg-d" style="background:#fef9c3;border-color:#fde047"></div>${t("leg.judge")}</div>
      <div class="fleg-i"><div class="fleg-d" style="background:#d1fae5;border-color:#6ee7b7"></div>${t("leg.output")}</div>
      <div class="fleg-i"><div class="fleg-d" style="background:#FCE4D6;border-color:#C55A00"></div>批次</div>
      <div class="fleg-i"><div class="fleg-d" style="background:#FDECEA;border-color:#922B21"></div>V憑證</div>
    </div>
  </div>`;
}

function getSVG(id,fid){
  const fn=FLOW_SVGS[id];
  if(fn&&fn[fid]) return fn[fid]();
  return `<div style="padding:40px;text-align:center;color:#888;font-size:13px">⏳ ${fid} 流程圖建構中...</div>`;
}

function swFlow(id,fid){
  _curFlow[id]=fid;
  const el=document.getElementById('fsvg-'+id);
  if(el) el.innerHTML=getSVG(id,fid);
  // 更新 Tab 樣式
  const m=MODS[id];
  if(!m) return;
  document.querySelectorAll(`[data-mod="${id}"].ftab`).forEach(btn=>{
    const on=btn.dataset.fid===fid;
    btn.style.background=on?m.color:'#fff';
    btn.style.color=on?'#fff':m.color;
    btn.style.borderColor=on?m.color:m.color+'44';
  });
}

// ════════════════════════════════════════
// 作業清單
// ════════════════════════════════════════
function renderOps(id){
  const m=MODS[id];
  return Object.entries(m.ops).map(([tp,ops])=>{
    const tc=TC[tp];
    const cards=ops.map(([code,name])=>{
      const dn=getOpsName(code)||name;
      return `
      <div class="op-card" onclick="openPan('${id}','${tp}','${code}','${dn}')"
        onmouseover="this.style.borderColor='${tc.color}88';this.style.background='${tc.lt}'"
        onmouseout="this.style.borderColor='#e0e0e0';this.style.background='#fff'">
        <div class="op-code" style="color:${tc.color}">${code}</div>
        <div class="op-name">${dn}</div>
        <div class="op-hint">${t("ui.ops.hint")}</div>
      </div>`;
    }).join('');
    return `<div class="type-sec">
      <div class="type-hdr">
        <div class="type-pill" style="background:${tc.lt};border-color:${tc.color}66;color:${tc.color}">${t("ops.type."+tp)||tc.label}</div>
        <div class="type-desc">${tc.desc}</div>
        <div class="type-line"></div>
      </div>
      <div class="op-grid">${cards}</div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════
// 第三層面板
// ════════════════════════════════════════
function openPan(modId,type,code,name){
  const m=MODS[modId],tc=TC[type]; _tc=tc;
  const panel=document.getElementById('panel');
  panel.style.setProperty('--tc',tc.color);
  document.getElementById('ph').style.borderBottomColor=tc.color;
  document.getElementById('ph-tags').innerHTML=
    `<span class="ph-tag" style="background:${tc.color}">${tc.label}</span>`+
    `<span class="ph-tag" style="background:${m.color}">${m.code}</span>`+
    `<span style="font-size:12px;font-weight:800;color:${tc.color};margin-left:3px">${code}</span>`;
  document.getElementById('ph-title').textContent=name;

  const btns = type==='B'
    ? [['▶️','執行',true],['📤','輸出',false],['✖️','關閉',false]]
    : type==='G'
    ? [['➕','新增',false],['✏️','修改',false],['🗑️','刪除',false],['🔍','查詢',false],
       ['📤','輸出',false],['🖨️','列印',false],['✅','確認',true],['↩️','取消確認',false],
       ['🗂️','作廢',false],['✖️','關閉',false]]
    : [['🔍','查詢',false],['📤','輸出Excel',false],['🖨️','列印',false],['✖️','關閉',false]];

  document.getElementById('ptb').style.borderBottomColor=tc.color;
  document.getElementById('ptb').innerHTML=btns.map(([ico,lbl,hi])=>
    `<button class="ptb-btn" style="${hi
      ?`background:${tc.color};border-color:${tc.color};color:#fff`
      :`border-color:${tc.color};color:${tc.color}`}">${ico}<span style="font-size:9px">${lbl}</span></button>`
  ).join('');

  renderPB(type,tc,m,code);
  document.getElementById('pf').innerHTML=
    `<span>${m.name}（${m.code}）→ ${tc.label} → ${code}</span><span style="color:${tc.color}">${tc.desc}</span>`;

  const ov=document.getElementById('ov');
  ov.style.display='block';
  setTimeout(()=>{ov.classList.add('vis');panel.classList.add('vis');},20);
}

function renderPB(type,tc,m,code){
  const yr=new Date().getFullYear(), mo=String(new Date().getMonth()+1).padStart(2,'0');
  const pb=document.getElementById('pb');
  if(type==='G'){
    _tabIdx=0;
    pb.innerHTML=`<div class="lbl" style="background:${tc.color}">主資料區</div>
    <div class="fld-row">
      <div class="fld"><div class="fld-l">單號</div><div class="fld-v">${code}-${yr}${mo}-0001</div></div>
      <div class="fld"><div class="fld-l">群組</div><div class="fld-v">台北業務員工</div></div>
      <div class="fld"><div class="fld-l">狀態</div>
        <select class="st-sel" id="stsel" onchange="chkSt(this)" style="color:#888">
          <option>DRAFT</option><option>PENDING</option><option>CONFIRMED</option>
          <option>REJECTED</option><option>CANCELLED</option>
        </select>
      </div>
      <div id="stamp-wrap" style="display:flex;align-items:center"></div>
    </div>
    <div class="lbl" style="background:${tc.color}">明細區</div>
    <div class="itabs" style="border-bottom-color:${tc.color}">
      ${['頁籤一 基本資料','頁籤二 明細資料','頁籤三 補充說明'].map((t,i)=>
        `<button class="itab${i===0?' on':''}" style="${i===0?`background:${tc.color};color:#fff;border-color:${tc.color}`:''}"
          onclick="swTab(this,${i})">${t}</button>`).join('')}
    </div>
    <div class="itab-body" id="itab-body"></div>
    <div class="note-g">💡 切換狀態 CONFIRMED → 出現「核」印章</div>`;
    swTab(document.querySelector('.itab'),0);
  } else if(type==='B'){
    pb.innerHTML=`<div class="ex-box"><div style="font-size:11px;color:#888;font-weight:700;margin-bottom:7px">執行條件</div>
      <div class="fld-row">
        ${[['執行期間','2026-01～2026-03'],['群組範圍','全公司'],['處理模式','全量更新']]
          .map(([l,v])=>`<div class="fld"><div class="fld-l">${l}</div><div class="fld-v">${v}</div></div>`).join('')}
      </div></div>
    <div class="ex-warn"><div style="font-size:11px;color:#E65100;font-weight:700;margin-bottom:4px">⚠️ 執行前提醒</div>
      <div style="font-size:11px;color:#595959">將處理資料 <strong>342 筆</strong>，執行後無法還原。</div></div>
    <div class="ex-box"><div style="font-size:11px;color:#888;font-weight:700;margin-bottom:5px">執行結果</div>
      <div style="display:flex;gap:14px;font-size:11px">
        <span style="color:#1B5E20">✅ 成功：338 筆</span><span style="color:#C00">⚠️ 失敗：4 筆</span>
      </div></div>`;
  } else {
    pb.innerHTML=`<div class="lbl" style="background:${tc.color}">查詢條件</div>
    <div class="fld-row">
      ${[['期間（起）','2026-01-01'],['期間（迄）','2026-03-31'],['群組','全部']]
        .map(([l,v])=>`<div class="fld"><div class="fld-l">${l}</div><div class="fld-v">${v}</div></div>`).join('')}
    </div>
    <div class="lbl" style="background:${tc.color}">查詢結果</div>
    <table><thead><tr>${['期間','部門','員工','項目','結果']
      .map(h=>`<th style="background:${tc.color}22">${h}</th>`).join('')}</tr></thead>
    <tbody>
      <tr><td>2026 Q1</td><td>業務部</td><td>王小明</td><td>KPI達成</td><td>92%</td></tr>
      <tr><td>2026 Q1</td><td>業務部</td><td>李大華</td><td>KPI達成</td><td>78%</td></tr>
    </tbody></table>`;
  }
}

function swTab(el,idx){
  _tabIdx=idx;
  document.querySelectorAll('.itab').forEach((t,i)=>{
    const on=i===idx;
    t.style.background=on?_tc.color:'#f0f0f0';
    t.style.color=on?'#fff':'#888';
    t.style.borderColor=on?_tc.color:'#e0e0e0';
    t.classList.toggle('on',on);
  });
  const d=TABS_DATA[idx];
  document.getElementById('itab-body').innerHTML=
    `<table><thead><tr>${d.h.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${d.r.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function chkSt(sel){
  const cols={DRAFT:'#888',PENDING:'#E65100',CONFIRMED:'#1B5E20',REJECTED:'#5D4037',CANCELLED:'#555'};
  sel.style.color=cols[sel.value]||'#888';
  const cfg={
    PENDING:{l:'待核',c:'#7B3F00',bg:'#FFF3E0',br:'#E65100',sz:'11px'},
    CONFIRMED:{l:'核',c:'#7B0000',bg:'#FDECEA',br:'#C62828',sz:'17px'},
    REJECTED:{l:'退',c:'#4E342E',bg:'#EFEBE9',br:'#8D6E63',sz:'11px'},
    CANCELLED:{l:'廢',c:'#424242',bg:'#F5F5F5',br:'#9E9E9E',sz:'11px'},
  };
  const s=cfg[sel.value];
  document.getElementById('stamp-wrap').innerHTML=s
    ?`<div class="stamp" style="border:2.5px solid ${s.br};background:${s.bg}">
        <span style="color:${s.c};font-size:${s.sz}">${s.l}</span></div>`:'';
}

function closePan(){
  document.getElementById('ov').classList.remove('vis');
  document.getElementById('panel').classList.remove('vis');
  setTimeout(()=>document.getElementById('ov').style.display='none',300);
}
</script>
